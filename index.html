<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전북대학교 한국어 4급 시험 대비</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --primary: #1a3a6b;
    --primary-light: #2d5aa0;
    --accent: #e8501a;
    --bg: #f5f6fa;
    --card: #ffffff;
    --text: #1a1a2e;
    --text-sub: #5a6278;
    --border: #e2e5ef;
    --correct: #1a7a3a;
    --correct-bg: #e8f5ee;
    --wrong: #c0392b;
    --wrong-bg: #fdecea;
    --selected: #2d5aa0;
    --selected-bg: #e8eef8;
    --radius: 12px;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--primary);
    color: white;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 12px rgba(26,58,107,0.3);
  }
  .header-logo {
    width: 44px; height: 44px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700; color: white;
    flex-shrink: 0;
  }
  .header-title { font-size: 17px; font-weight: 700; line-height: 1.3; }
  .header-sub { font-size: 12px; opacity: 0.7; margin-top: 2px; }

  .container { max-width: 720px; margin: 0 auto; padding: 24px 16px; }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px;
    margin-bottom: 16px;
  }

  .setup-title {
    font-size: 20px; font-weight: 700;
    margin-bottom: 20px; color: var(--primary);
    display: flex; align-items: center; gap: 8px;
  }
  .setup-title::before {
    content: '';
    display: inline-block;
    width: 4px; height: 22px;
    background: var(--accent);
    border-radius: 2px;
  }

  .section-label {
    font-size: 13px; font-weight: 700;
    color: var(--text-sub); letter-spacing: 0.5px;
    margin-bottom: 10px; text-transform: uppercase;
  }

  .lesson-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .lesson-btn {
    padding: 10px 4px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: white;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    color: var(--text);
  }
  .lesson-btn:hover { border-color: var(--primary-light); color: var(--primary); }
  .lesson-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
  .lesson-all { grid-column: 1 / -1; border-color: var(--accent); color: var(--accent); font-weight: 700; }
  .lesson-all.active { background: var(--accent); border-color: var(--accent); color: white; }

  .domain-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .domain-btn {
    padding: 12px 8px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: white;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    color: var(--text);
  }
  .domain-btn:hover { border-color: var(--primary-light); }
  .domain-btn.active { background: var(--primary); border-color: var(--primary); color: white; }

  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 24px;
  }
  .mode-btn {
    padding: 16px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: white;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }
  .mode-btn:hover { border-color: var(--primary-light); }
  .mode-btn.active { border-color: var(--primary); background: var(--selected-bg); }
  .mode-btn .mode-name { font-size: 14px; font-weight: 700; color: var(--primary); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .mode-btn .mode-desc { font-size: 12px; color: var(--text-sub); line-height: 1.4; }

  .start-btn {
    width: 100%; padding: 16px;
    background: var(--primary); color: white;
    border: none; border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px; font-weight: 700;
    cursor: pointer; transition: background 0.15s;
  }
  .start-btn:hover { background: var(--primary-light); }
  .start-btn:disabled { background: #b0b8cc; cursor: default; }

  .progress-wrap { margin-bottom: 20px; }
  .progress-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .progress-text { font-size: 13px; color: var(--text-sub); font-weight: 500; }
  .progress-score { font-size: 13px; font-weight: 700; color: var(--primary); }
  .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.3s ease; }

  .question-meta { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px; letter-spacing: 0.3px; }
  .badge-lesson { background: #e8eef8; color: var(--primary); }
  .badge-domain { background: #fff3ee; color: var(--accent); }
  .badge-type { background: #f0f0f5; color: var(--text-sub); }

  /* 지문 박스 - 항상 보임 */
  .passage-box {
    background: #f8f9fd;
    border: 1px solid var(--border);
    border-left: 4px solid var(--primary);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
    font-size: 14px;
    line-height: 1.9;
    color: var(--text);
    white-space: pre-wrap;
  }
  .passage-label {
    font-size: 11px; font-weight: 700;
    color: var(--primary); letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .bogi-box {
    background: #fffbf5;
    border: 1px dashed #e8c078;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 14px;
    font-size: 14px;
    line-height: 1.8;
  }
  .bogi-label { font-size: 11px; font-weight: 700; color: #8a6820; margin-bottom: 6px; letter-spacing: 0.5px; }

  .context-box {
    background: #f8f9fd;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 16px;
    font-size: 15px;
    line-height: 1.9;
    border: 1px solid var(--border);
  }

  .question-text { font-size: 16px; font-weight: 600; line-height: 1.7; margin-bottom: 18px; color: var(--text); }

  .options { display: flex; flex-direction: column; gap: 8px; }
  .option {
    padding: 13px 16px;
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    line-height: 1.5;
    transition: all 0.12s;
    display: flex; align-items: flex-start; gap: 10px;
    background: white; color: var(--text);
  }
  .option:hover { border-color: var(--selected); background: var(--selected-bg); }
  .option.selected { border-color: var(--selected); background: var(--selected-bg); color: var(--primary); }
  .option.correct { border-color: var(--correct); background: var(--correct-bg); color: var(--correct); }
  .option.wrong { border-color: var(--wrong); background: var(--wrong-bg); color: var(--wrong); }
  .option-num { font-weight: 700; flex-shrink: 0; width: 20px; text-align: center; margin-top: 1px; }
  .option-text { flex: 1; }

  .explanation {
    margin-top: 14px; padding: 14px 16px;
    border-radius: 8px; font-size: 13px; line-height: 1.7;
    border-left: 4px solid; display: none;
  }
  .explanation.correct-exp { background: var(--correct-bg); border-color: var(--correct); color: #0f4d28; display: block; }
  .explanation.wrong-exp { background: var(--wrong-bg); border-color: var(--wrong); color: #7a1a14; display: block; }
  .exp-label { font-weight: 700; margin-bottom: 4px; font-size: 12px; }

  .exam-footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: white; border-top: 1px solid var(--border);
    padding: 12px 16px; display: flex; justify-content: center;
  }
  .submit-btn {
    padding: 13px 32px; background: var(--accent);
    color: white; border: none; border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px; font-weight: 700; cursor: pointer;
    transition: background 0.15s; min-width: 200px;
  }
  .submit-btn:hover { background: #c43a10; }
  .submit-btn:disabled { background: #b0b8cc; cursor: default; }

  .result-score { text-align: center; padding: 32px 24px; }
  .score-circle {
    width: 120px; height: 120px; border-radius: 50%;
    background: var(--primary); color: white;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 8px 24px rgba(26,58,107,0.3);
  }
  .score-num { font-size: 36px; font-weight: 700; }
  .score-total { font-size: 14px; opacity: 0.8; }
  .score-label { font-size: 22px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
  .score-sub { font-size: 14px; color: var(--text-sub); }

  .result-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
  .stat-card { background: var(--bg); border-radius: 10px; padding: 14px; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 700; color: var(--primary); }
  .stat-label { font-size: 12px; color: var(--text-sub); margin-top: 2px; }

  .result-btns { display: flex; gap: 10px; margin-top: 20px; }
  .result-btn {
    flex: 1; padding: 13px; border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer; border: 2px solid; transition: all 0.15s;
  }
  .result-btn.primary { background: var(--primary); border-color: var(--primary); color: white; }
  .result-btn.outline { background: white; border-color: var(--primary); color: var(--primary); }
  .result-btn:hover { opacity: 0.85; }

  .empty-state { text-align: center; padding: 32px; color: var(--text-sub); font-size: 14px; }

  .quiz-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .back-btn {
    font-size: 13px; color: var(--text-sub);
    background: none; border: none; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 6px 0; display: flex; align-items: center; gap: 4px;
  }
  .mode-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; background: var(--selected-bg); color: var(--primary); }

  .quiz-bottom-space { height: 80px; }
  u { text-decoration: underline; text-underline-offset: 3px; }

  @media (max-width: 480px) {
    .lesson-grid { grid-template-columns: repeat(3, 1fr); }
    .domain-grid { grid-template-columns: 1fr 1fr; }
    header { padding: 16px; }
    .header-title { font-size: 15px; }
  }
</style>
</head>
<body>

<!-- 비밀번호 화면 -->
<div id="pw-screen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#f0f4ff;display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div style="background:white;border-radius:16px;padding:40px 36px;box-shadow:0 4px 24px rgba(0,0,0,0.12);text-align:center;width:300px;">
    <div style="font-size:2rem;margin-bottom:8px;">🔒</div>
    <div style="font-size:1.2rem;font-weight:700;color:#2d3748;margin-bottom:4px;">전북대학교 한국어 연수반</div>
    <div style="font-size:0.9rem;color:#718096;margin-bottom:24px;">4급 기말시험 대비 퀴즈</div>
    <input id="pw-input" type="password" placeholder="비밀번호를 입력하세요"
      style="width:100%;padding:10px 14px;border:2px solid #e2e8f0;border-radius:8px;font-size:1rem;box-sizing:border-box;outline:none;text-align:center;"
      onkeydown="if(event.key==='Enter') checkPw()"/>
    <div id="pw-error" style="color:#e53e3e;font-size:0.85rem;margin-top:8px;height:18px;"></div>
    <button onclick="checkPw()"
      style="margin-top:12px;width:100%;padding:11px;background:#4c6ef5;color:white;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;">
      입장하기
    </button>
  </div>
</div>

<script>
function checkPw() {
  var input = document.getElementById('pw-input').value.trim();
  if (input === '41') {
    document.getElementById('pw-screen').style.display = 'none';
    document.getElementById('pw-input').value = '';
  } else {
    document.getElementById('pw-error').textContent = '비밀번호가 틀렸습니다.';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
window.onload = function() {
  document.getElementById('pw-input').focus();
};
</script>

<header>
  <div class="header-logo">4급</div>
  <div>
    <div class="header-title">한국어 4급 시험 대비 퀴즈</div>
    <div class="header-sub">전북대학교 한국어 연수반 · 2026년 봄 학기</div>
  </div>
</header>

<div class="container">
  <div id="setup-screen">
    <div class="card">
      <div class="setup-title">문제 설정</div>

      <div class="section-label">📚 시험 범위 선택</div>
      <div class="lesson-grid">
        <button class="lesson-btn lesson-all active" onclick="toggleLesson('all')">전체</button>
        <button class="lesson-btn" data-lesson="10" onclick="toggleLesson(10)">10과</button>
        <button class="lesson-btn" data-lesson="11" onclick="toggleLesson(11)">11과</button>
        <button class="lesson-btn" data-lesson="12" onclick="toggleLesson(12)">12과</button>
        <button class="lesson-btn" data-lesson="13" onclick="toggleLesson(13)">13과</button>
        <button class="lesson-btn" data-lesson="14" onclick="toggleLesson(14)">14과</button>
        <button class="lesson-btn" data-lesson="15" onclick="toggleLesson(15)">15과</button>
        <button class="lesson-btn" data-lesson="16" onclick="toggleLesson(16)">16과</button>
        <button class="lesson-btn" data-lesson="17" onclick="toggleLesson(17)">17과</button>
        <button class="lesson-btn" data-lesson="18" onclick="toggleLesson(18)">18과</button>
      </div>

      <div class="section-label">✏️ 영역 선택</div>
      <div class="domain-grid">
        <button class="domain-btn active" data-domain="all" onclick="toggleDomain('all')">전체</button>
        <button class="domain-btn" data-domain="읽기" onclick="toggleDomain('읽기')">읽기</button>
        <button class="domain-btn" data-domain="어휘" onclick="toggleDomain('어휘')">어휘</button>
        <button class="domain-btn" data-domain="문법" onclick="toggleDomain('문법')">문법</button>
      </div>

      <div class="section-label">🎯 풀이 방식</div>
      <div class="mode-grid">
        <button class="mode-btn active" onclick="selectMode('feedback', this)">
          <div class="mode-name">💡 즉시 피드백</div>
          <div class="mode-desc">문제를 풀면 바로 정답과 해설을 확인할 수 있어요</div>
        </button>
        <button class="mode-btn" onclick="selectMode('exam', this)">
          <div class="mode-name">📝 시험 모드</div>
          <div class="mode-desc">모든 문제를 다 풀고 제출하면 점수를 확인해요</div>
        </button>
      </div>

      <div id="count-info" style="font-size:13px;color:var(--text-sub);margin-bottom:16px;text-align:center;"></div>
      <button class="start-btn" id="start-btn" onclick="startQuiz()">시작하기</button>
    </div>
  </div>

  <div id="quiz-screen" style="display:none;">
    <div class="quiz-nav">
      <button class="back-btn" onclick="goSetup()">← 설정으로</button>
      <span class="mode-badge" id="mode-badge"></span>
    </div>
    <div class="progress-wrap">
      <div class="progress-info">
        <span class="progress-text" id="progress-text"></span>
        <span class="progress-score" id="progress-score"></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <div id="questions-container"></div>
    <div class="quiz-bottom-space" id="bottom-space" style="display:none;"></div>
    <div class="exam-footer" id="exam-footer" style="display:none;">
      <button class="submit-btn" id="submit-btn" onclick="submitExam()" disabled>
        제출하기 (<span id="answered-count">0</span>/20 완료)
      </button>
    </div>
  </div>

  <div id="result-screen" style="display:none;">
    <div class="card">
      <div class="result-score">
        <div class="score-circle">
          <div class="score-num" id="result-num"></div>
          <div class="score-total" id="result-total"></div>
        </div>
        <div class="score-label" id="result-label"></div>
        <div class="score-sub" id="result-sub"></div>
        <div class="result-stats">
          <div class="stat-card"><div class="stat-num" id="stat-correct"></div><div class="stat-label">정답</div></div>
          <div class="stat-card"><div class="stat-num" id="stat-wrong"></div><div class="stat-label">오답</div></div>
          <div class="stat-card"><div class="stat-num" id="stat-pct"></div><div class="stat-label">정답률</div></div>
        </div>
        <div class="result-btns">
          <button class="result-btn outline" onclick="goSetup()">다시 설정</button>
          <button class="result-btn primary" onclick="retryQuiz()">같은 설정으로 다시</button>
        </div>
      </div>
    </div>
    <div class="card" id="review-card">
      <div class="setup-title">오답 확인</div>
      <div id="review-container"></div>
    </div>
  </div>
</div>

<script id="quiz-data" type="application/json">
{"passages":[{"id":"10_\uc77d\uae30_2","lesson":10,"text_number":2,"content":"\ud3ec\uae30\ud558\ub824\ub294 \uadf8\ub54c\uac00 \uc131\uacf5\uc5d0 \uac00\uc7a5 \uac00\uae4c\uc6b4 \uc21c\uac04\uc774\ub2e4\n2003\ub144 \uc77c\uacf1 \uc0b4 \ub54c \ud0dc\uad8c\ub3c4 \uc2dc\uc791.\n2015\ub144 \uad6d\uc81c \ub300\ud68c \uccab \uc6b0\uc2b9.\n2018\ub144 \ubd80\uc0c1 \ub54c\ubb38\uc5d0 \uad6d\uc81c \ub300\ud68c\ub294\ucee4\ub155 \uad6d\ub0b4 \ub300\ud68c\uc5d0\ub3c4 \ucd9c\uc804\ud558\uc9c0 \ubabb\ud568. \ud3ec\uae30\ud558\uc9c0 \uc54a\uace0 \uc778\ub0b4\uc2ec\uc744 \uac00\uc9c0\uace0 \ud6c8\ub828\ud568.\n2020\ub144 \uc62c\ub9bc\ud53d\uc5d0\uc11c \ub3d9\uba54\ub2ec\uc744 \ub540.\n\"\ubb3c\uc740 100\u00b0C\uac00 \ub418\uc5b4\uc57c \ub053\uc2b5\ub2c8\ub2e4. \ud3ec\uae30\ud558\uace0 \uc2f6\uc5c8\ub358 \uc801\uc774 \ub9ce\uc9c0\ub9cc \uadf8\ub54c\ub9c8\ub2e4 \uc9c0\uae08\uc774 100\u00b0C\uc5d0 \uac00\uc7a5 \uac00\uae4c\uc6b4 \uc21c\uac04\uc774\ub77c\uace0 \uc0dd\uac01\ud588\uc2b5\ub2c8\ub2e4. \ub05d\uae4c\uc9c0 \ub178\ub825\ud558\ub294 \uc0ac\ub78c\uce58\uace0 \uc131\uacf5\ud558\uc9c0 \ubabb\ud558\ub294 \uc0ac\ub78c\uc740 \uc5c6\uc2b5\ub2c8\ub2e4. \ub9c8\uc9c0\ub9c9 1\u00b0C\ub97c \ub192\uc774\uae30 \uc704\ud574 \uc5f4\uc815\uc801\uc73c\ub85c \ud6c8\ub828\ud558\ub294 \uac83, \uadf8\uac83\uc774 \uc81c\uac00 \ud560 \uc218 \uc788\ub294 \ucd5c\uc120\uc774\uc5c8\uc2b5\ub2c8\ub2e4.\""},{"id":"11_\uc77d\uae30_1","lesson":11,"text_number":1,"content":"\uc870\uae08 \uc5b4\uc0c9\ud574\uc838\ub3c4 \uad1c\ucc2e\uc544\n\"\uc0c1\uc0ac\uac00 \ud558\ub77c\uace0 \ud574\uc11c\u2026.\"\n\"\uad50\uc218\ub2d8\uc774 \uc2dc\ud0a4\uba74 \ud574\uc57c\uc9c0\u2026.\"\n\"\uac70\uc808\ud558\uba74 \ub3d9\ub8cc\uc640 \uc5b4\uc0c9\ud574\uc9c0\uaca0\uc9c0?\"\n\ub0a8\ub4e4\uc774 \ub9d0\ud558\ub294 \uac78 \ubaa8\ub450 \ub4e4\uc5b4\uc8fc\ub2e4 \ubcf4\ub2c8\uae4c \ub098 \uc790\uc2e0\uc740 \uc5c6\uc5b4\uc9c0\uace0 \uc0ac\ud68c\uc0dd\ud65c\uc5d0\ub3c4 \ubb38\uc81c\uac00 \uc0dd\uacbc\ub098\uc694? \uc774\uc81c \uc194\uc9c1\ud558\uac8c \ub9d0\ud574 \ubd05\uc2dc\ub2e4. \u300e\uc870\uae08 \uc5b4\uc0c9\ud574\uc838\ub3c4 \uad1c\ucc2e\uc544\u300f"},{"id":"11_\uc77d\uae30_3","lesson":11,"text_number":3,"content":"\ucd5c\uadfc \ud55c \uae30\uc0ac\uc5d0 \uc758\ud558\uba74 \ub300\ud559\uc0dd\ub4e4\uc758 \uace0\ubbfc 1\uc704\ub294 \ucde8\uc5c5\uc774 \uc544\ub2cc '\ub300\uc778 \uad00\uacc4'\ub85c \ub098\ud0c0\ub0ac\ub2e4. \uc9c1\uc7a5\uc778\ub4e4 \uc5ed\uc2dc \ub300\uc778 \uad00\uacc4 \ub54c\ubb38\uc5d0 \uac00\uc7a5 \ub9ce\uc740 \uc2a4\ud2b8\ub808\uc2a4\ub97c \ubc1b\ub294 \uac83\uc73c\ub85c \uc870\uc0ac\ub418\uc5c8\ub2e4. \uc0ac\ud68c\uc0dd\ud65c\uc744 \uc798\ud558\uae30 \uc704\ud574\uc11c\ub294 \uc5b4\ub5bb\uac8c \ud574\uc57c \ud560\uae4c?\n1. \uc798 \ub4e3\uace0 \uc801\uc808\ud55c \ubc18\uc751\uc744 \ubcf4\uc77c \uac83\n\uc0c1\ub300\ubc29\uc758 \ub9d0\uc744 \ub4e4\uc744 \ub54c \uc790\uc5f0\uc2a4\ub7fd\uac8c \ub9de\uc7a5\uad6c\ub97c \uce58\uace0 \uce6d\ucc2c\uc744 \uc790\uc8fc \ud558\ub294 \uac83\uc774 \uc88b\ub2e4. \uadf8\ub7ec\ub098 \ubb34\uc870\uac74 \"\uc88b\uc544\uc694\"\uc640 \uac19\uc740 \uce6d\ucc2c\uc744 \ud558\uac70\ub098 \ud56d\uc0c1 \"\ub124, \ub124\"\ud558\uace0 \ub9de\uc7a5\uad6c\ub97c \uce58\uba74 \uc131\uc758 \uc5c6\ub2e4\ub294 \uc778\uc0c1\uc744 \uc904 \uc218 \uc788\uc73c\ubbc0\ub85c \ud53c\ud574\uc57c \ud55c\ub2e4.\n2. \ud560 \uc218 \uc5c6\ub294 \uc77c\uc740 \ubd84\uba85\ud558\uac8c \uac70\uc808\ud558\uace0, \ud560 \uc218 \uc5c6\ub294 \uc774\uc720\ub97c \uc194\uc9c1\ud558\uac8c \ub9d0\ud560 \uac83\n\uac70\uc808\uc744 \ud558\uba74 \uc88b\uc740 \uad00\uacc4\ub97c \uc720\uc9c0\ud558\uae30 \uc5b4\ub835\uace0 \uc0ac\uc774\uac00 \uc5b4\uc0c9\ud574\uc9c4\ub2e4\uace0 \ubbff\ub294 \uc0ac\ub78c\ub4e4\uc774 \ub9ce\ub2e4. \uadf8\ub7ec\ub098 \ubb34\ub9ac\ud574\uc11c \ubd80\ud0c1\uc744 \ub4e4\uc5b4\uc8fc\ub2e4 \ubcf4\uba74 \uadf8 \uc0ac\ub78c\uacfc\uc758 \uad00\uacc4\uac00 \uc810\uc810 \ubd80\ub2f4\uc2a4\ub7ec\uc6cc\uc9c8 \ubfd0\ub9cc \uc544\ub2c8\ub77c \uc57d\uc18d\uc744 \uc5b4\uae30\uac8c \ub418\ub294 \uc77c\ub3c4 \uc0dd\uae38 \uc218 \uc788\ub2e4.\n3. \uc0c1\ub300\ubc29\uacfc \ub2e4\ub984\uc744 \uc778\uc815\ud560 \uac83\n\ub0b4 \uc0dd\uac01\ub300\ub85c \uc0c1\ub300\ubc29\uc744 \ud3c9\uac00\ud558\uc9c0 \ub9d0\uace0 '\uadf8\ub7f4 \uc218\ub3c4 \uc788\uc9c0'\ub77c\uace0 \uc0dd\uac01\ud574\uc57c \ud55c\ub2e4.\n4. \uc0c1\ub300\ubc29\uacfc \ub2e4\ub978 \uc758\uacac\uc744 \uc870\uc2ec\uc2a4\ub7fd\uac8c \uc81c\uc2dc\ud560 \uac83\n\uc798 \ubaa8\ub97c \ub54c\ub294 \uc9c8\ubb38\uc744 \ud574\uc11c \uc0c1\uc0ac\uac00 \uc2dc\ud0a8 \uc77c\uc744 \uc815\ud655\ud788 \ud30c\uc545\ud558\ub294 \uac83\uc774 \uc911\uc694\ud558\ub2e4."},{"id":"12_\uc77d\uae30_1","lesson":12,"text_number":1,"content":"\uc0ac\ub78c\ub4e4\uc740 \uc790\uae30\uac00 \uacbd\ud5d8\ud558\uac70\ub098 \uc798 \uc544\ub294 \uac83\uc73c\ub85c \uc138\uc0c1\uc758 \uc77c\ub4e4\uc744 \uc124\uba85\ud558\uae30 \ub9c8\ub828\uc774\ub2e4. \ud55c\uad6d\uc5d0\ub294 \uccad\uac1c\uad6c\ub9ac\uac00 \ube44\ub9cc \uc624\uba74 \uc6b0\ub294 \uc774\uc720\ub97c \uc7ac\ubbf8\uc788\uac8c \uc124\uba85\ud55c \uc774\uc57c\uae30\uac00 \uc788\ub2e4. \uc774 \uc774\uc57c\uae30\uc5d0\uc11c \uccad\uac1c\uad6c\ub9ac\ub294 \uc5c4\ub9c8\uc758 \ubb34\ub364\uc774 \ub5a0\ub0b4\ub824\uac08\uae4c \uac71\uc815\ud558\uace0 \uc5c4\ub9c8 \ub9d0\ub300\ub85c \ud558\uc9c0 \uc54a\uc740 \uc790\uc2e0\uc758 \ud589\ub3d9\uc744 \ud6c4\ud68c\ud558\uba74\uc11c \uc6b4\ub2e4. \uc774 \uc774\uc57c\uae30\uc5d0\uc11c '\uccad\uac1c\uad6c\ub9ac \uac19\ub2e4'\ub294 \ub9d0\uc774 \uc0dd\uaca8\ub0ac\ub2e4. \uc5b4\ub5a4 \uc544\uc774\uac00 \uc5c4\ub9c8 \ub9d0\uc744 \uc798 \ub4e3\uc9c0 \uc54a\ub294\ub2e4\ub294 \uac83\uc740 \uadf8 \uc544\uc774\uac00 '\uccad\uac1c\uad6c\ub9ac \uac19\ub2e4'\ub294 \ub9d0\uc744 \uc790\uc8fc \ub4e3\ub294 \uac83\uc73c\ub85c \uc54c \uc218 \uc788\ub2e4."},{"id":"12_\uc77d\uae30_2","lesson":12,"text_number":2,"content":"(\uac00) \uc5b4\ub290 \ub098\ub77c\uc5d0\ub098 \uc61b\ub0a0\ubd80\ud130 \uc785\uc5d0\uc11c \uc785\uc73c\ub85c \uc804\ud574\uc838 \ub0b4\ub824\uc624\ub294 \uc774\uc57c\uae30\ub4e4\uc774 \uc788\ub2e4. \uadf8\ub7f0 \uc774\uc57c\uae30\ub4e4\uc740 \uc0ac\ub78c\ub4e4\uc5d0\uac8c \uc7ac\ubbf8\ubfd0\ub9cc \uc544\ub2c8\ub77c \uad50\ud6c8\uc744 \uc8fc\ub294 \uacbd\uc6b0\ub3c4 \ub9ce\ub2e4. \uc61b\ub0a0\uc774\uc57c\uae30\ub294 '\ubd80\ubaa8\ub2d8\uaed8 \ud6a8\ub3c4\ud574\uc57c \ud55c\ub2e4', '\uc740\ud61c\ub97c \uac1a\uc544\uc57c \ud55c\ub2e4' \ub4f1\uc758 \ub2e4\uc591\ud55c \uac00\ub974\uce68\uc744 \uc8fc\ub294\ub370 \uadf8\uc911\uc5d0\uc11c\ub3c4 '\uad8c\uc120\uc9d5\uc545'\uc774\ub77c\ub294 \uad50\ud6c8\uc774 \uc61b\ub0a0\uc774\uc57c\uae30\uc5d0 \uc790\uc8fc \ub4f1\uc7a5\ud55c\ub2e4.\n(\ub098) \uc774\ub7f0 \uad50\ud6c8\uc744 \uc8fc\ub294 \ub300\ud45c\uc801\uc778 \uc61b\ub0a0\uc774\uc57c\uae30\ub85c '\uae08\ub3c4\ub07c \uc740\ub3c4\ub07c'\ub97c \ub4e4 \uc218 \uc788\ub2e4. \uc815\uc9c1\ud55c \ub098\ubb34\uafbc\uc740 \uc695\uc2ec\uc744 \ubd80\ub9ac\uc9c0 \uc54a\uace0 \uc790\uc2e0\uc758 \ub3c4\ub07c\ub294 \ub0a1\uc740 \uc1e0\ub3c4\ub07c\ub77c\uace0 \ub9d0\ud558\uace0 \uc0b0\uc2e0\ub839\uc5d0\uac8c \uae08\ub3c4\ub07c\uc640 \uc740\ub3c4\ub07c\ub97c \ubaa8\ub450 \uc120\ubb3c\ub85c \ubc1b\ub294\ub2e4. \uc695\uc2ec\uc744 \ubd80\ub9b0 \uc774\uc6c3\uc9d1 \ub098\ubb34\uafbc\uc740 \uae08\ub3c4\ub07c\ub97c \uc5bb\uae30\ub294\ucee4\ub155 \uc790\uc2e0\uc758 \ub3c4\ub07c\uae4c\uc9c0 \ube7c\uc557\uae30\uac8c \ub41c\ub2e4.\n(\ub2e4) '\uad8c\uc120\uc9d5\uc545'\uc774\ub77c\ub294 \uad50\ud6c8\uc774 \uc790\uc8fc \ub4f1\uc7a5\ud55c\ub2e4\ub294 \uac83\uc740 \ub9ce\uc740 \uc61b\ub0a0\uc774\uc57c\uae30\ub85c \uc54c \uc218 \uc788\ub2e4. \ucc29\ud55c \ud765\ubd80\uac00 \uc81c\ube44 \ub2e4\ub9ac\ub97c \uace0\uccd0 \uc8fc\uace0 \ubd80\uc790\uac00 \ub41c\ub2e4\ub294 '\ud765\ubd80\uc640 \ub180\ubd80'\ub97c \ud1b5\ud574\uc11c\ub3c4 '\ucc29\ud55c \uc0ac\ub78c\uc740 \ubcf5\uc744 \ubc1b\uace0 \ub098\uc05c \uc0ac\ub78c\uc740 \ubc8c\uc744 \ubc1b\uae30 \ub9c8\ub828'\uc774\ub77c\ub294 \uad50\ud6c8\uc744 \uc5bb\uc744 \uc218 \uc788\ub2e4."},{"id":"13_\uc77d\uae30_1","lesson":13,"text_number":1,"content":"'\ub178\ud0a4\uc988\uc874' \ud655\ub300\uc5d0 \ub300\ud55c \ub17c\ub780\uc774 \ub728\uac81\ub2e4\n\ub9ac\uc5bc\ubbf8\ud130\uc5d0\uc11c \ud55c\uad6d\uc778 \uc131\uc778 \ub0a8\ub140 513\uba85\uc5d0\uac8c '\ub178\ud0a4\uc988\uc874'\uc5d0 \ucc2c\uc131\ud558\ub294\uc9c0 \ubb3c\uc740 \uacb0\uacfc, \ucc2c\uc131\ud55c\ub2e4\ub294 \uc751\ub2f5\uc774 54.7%, \ubc18\ub300\ud55c\ub2e4\ub294 \uc751\ub2f5\uc774 36.2%\ub85c \ub098\ud0c0\ub0ac\ub2e4.\n\uc77c\ubd80 \uac00\uac8c\uc5d0\uc11c\ub294 \uc5b4\ub9b0\uc774 \uc190\ub2d8 \ub54c\ubb38\uc5d0 \ubd88\ud3b8\uc744 \uacaa\ub290\ub2c8 \ucc28\ub77c\ub9ac \uc218\uc785\uc774 \uc904\uc5b4\ub3c4 \ub178\ud0a4\uc988\uc874\uc744 \uc120\ud0dd\ud558\ub294 \uac8c \ub0ab\ub2e4\ub294 \ubc18\uc751\uc774\ub2e4. \ub610\ud55c \uc548\uc804\uc744 \uc704\ud574 \ub178\ud0a4\uc988\uc874\uc744 \uc120\ud0dd\ud560 \uc218\ubc16\uc5d0 \uc5c6\uc5c8\ub2e4\ub294 \uac00\uac8c \uc8fc\uc778\ub3c4 \uc788\ub2e4. \uadf8\ub7ec\ub098 \ub9ce\uc740 \ubd80\ubaa8\ub4e4\uc740 \uc5b4\ub978\ub4e4\ub3c4 \uc2dc\ub044\ub7fd\uac8c \ub5a0\ub4dc\ub294 \uacbd\uc6b0\uac00 \uc788\ub294\ub370 \uc5b4\ub9b0\uc774\ub9cc \ucd9c\uc785\uc744 \uc81c\ud55c\ud558\ub294 \uac83\uc740 \ubd88\uacf5\ud3c9\ud55c \uc77c\uc774\uba70, \ub178\ud0a4\uc988\uc874\uc740 \uc5b4\ub9b0\uc774\ub97c \ucc28\ubcc4\ud558\ub294 \uac83\uc774\ubbc0\ub85c \uae08\uc9c0\ud574\uc57c \ud55c\ub2e4\ub294 \uc785\uc7a5\uc774\ub2e4."},{"id":"13_\uc77d\uae30_2","lesson":13,"text_number":2,"content":"[\ucc2c\uc131\ud55c\ub2e4] \ub178\ud0a4\uc988\uc874\uc744 \ud655\ub300\ud574\uc57c \ud55c\ub2e4\uace0 \uc0dd\uac01\ud55c\ub2e4\n\ubd80\ubaa8\ub4e4\uc774 \uc790\uc2e0\uc758 \uc544\uc774\ub97c \uc81c\ub300\ub85c \uad50\uc721\ud558\uc9c0 \uc54a\uc544\uc11c \uc8fc\ubcc0 \uc0ac\ub78c\ub4e4\uc5d0\uac8c \ud53c\ud574\ub97c \uc8fc\ub294 \uacbd\uc6b0\ub3c4 \ub9ce\ub2e4. \ud2b9\ud788, \ucc1c\uc9c8\ubc29\uc774\ub098 \uacf5\uc5f0\uc7a5\uc5d0\ub294 10\uc138 \ubbf8\ub9cc \uc5b4\ub9b0\uc774\uc758 \ucd9c\uc785\uc744 \uc81c\ud55c\ud558\ub294 \uac83\uc774 \ubc14\ub78c\uc9c1\ud558\ub2e4.\n[\ubc18\ub300\ud55c\ub2e4] \ub178\ud0a4\uc988\uc874\uc744 \ud655\ub300\ud558\uba74 \uc548 \ub41c\ub2e4\n\uc81c\uc8fc\ub3c4\uc640 \uac19\uc740 \uc720\uba85\ud55c \uad00\uad11\uc9c0\uc5d0\uc11c \ub178\ud0a4\uc988\uc874\uc774 \ud655\ub300\ub418\ub294 \ucd94\uc138\ub77c\ub294 \ub274\uc2a4 \uae30\uc0ac\ub97c \ubcf4\uc558\ub2e4. \ub178\ud0a4\uc988\uc874\uc740 \uc544\uc774\uc640 \uc544\uc774\uc758 \ubd80\ubaa8\ub97c \ucc28\ubcc4\ud558\ub294 \uac83\uc774\ub2e4. \uae08\uc5f0 \uad6c\uc5ed\uc5d0\uc11c\ub3c4 \ub2f4\ubc30\ub97c \ud53c\uc6b0\ub294 \uc0ac\ub78c\uc758 \ucd9c\uc785\uc744 \uc81c\ud55c\ud558\uc9c0\ub294 \uc54a\uc73c\uba70 \ub2f4\ubc30\ub9cc \ubabb \ud53c\uc6b0\uac8c \ud55c\ub2e4. \ub610 \ub178\ud0a4\uc988\uc874\uc73c\ub85c \uc6b4\uc601\ud558\ub294 \uac00\uac8c\uc5d0\uc11c \ubc18\ub824\ub3d9\ubb3c\uc758 \ucd9c\uc785\uc744 \uc81c\ud55c\ud558\uc9c0 \uc54a\ub294 \uacbd\uc6b0\uac00 \uc788\ub294\ub370 \uc544\uc774\uac00 \ubc18\ub824\ub3d9\ubb3c\ub9cc \ubabb\ud558\ub2e4\ub294 \uac83\uc778\uac00?"},{"id":"14_\uc77d\uae30_1","lesson":14,"text_number":1,"content":"\ub9ce\uc740 \ud55c\uad6d\uc778\ub4e4\uc774 \uc678\uad6d\uc778\uc774 \ud55c\uad6d\uc5d0\uc11c \uc0dd\ud65c\ud560 \ub54c \uc0ac\ud22c\ub9ac\uba70 \uc874\ub313\ub9d0\uc774\uba70 \uc774\ud574\ud558\uae30 \uc5b4\ub824\uc6b4 \ub9d0\uc744 \ub4e4\uc744 \uac70\ub77c\uace0 \uc0dd\uac01\ud55c\ub2e4. \ud0dd\uc2dc \uae30\uc0ac\ub2d8\uc758 \uc5b5\uc591\uc774 \uac15\ud574\uc11c \ub9d0\uc744 \uc798 \ubabb \uc54c\uc544\ub4e4\uc744 \ub54c\ub3c4 \uc788\uace0 '\uc8fc\ubb38\ud558\uc2e0 \uc544\uba54\ub9ac\uce74\ub178 \ub098\uc624\uc168\uc2b5\ub2c8\ub2e4' \uac19\uc740 \uc774\ud574\ud560 \uc218 \uc5c6\ub294 \uc874\ub313\ub9d0\ub3c4 \uc788\ub2e4. \uadf8\ub7ec\ub098 \uc694\uc998 \uc0ac\ud22c\ub9ac\ub098 \uc874\ub313\ub9d0\ubcf4\ub2e4 \ub098\ub97c \ud798\ub4e4\uac8c \ud558\ub294 \uac83\uc740 \ud55c\uad6d \uce5c\uad6c\ub4e4\uc774 \uc0ac\uc6a9\ud558\ub294 \uc2e0\uc870\uc5b4\uc774\ub2e4.\n\ud55c\uad6d\uc5b4\uc758 \uc0ac\ud22c\ub9ac\ub098 \uc874\ub313\ub9d0\uc740 \uc2e0\uc870\uc5b4\ub098 \uc720\ud589\uc5b4\uc5d0 \ube44\ud574\uc11c \uc774\ud574\ud558\uae30 \uc26c\uc6b4 \ud3b8\uc774\ub2e4. \uc0ac\uc804\uc5d0\uc11c \uadf8 \ub9d0\uc744 \ucc3e\uc544\ubcfc \uc218\ub3c4 \uc788\uace0, \uc0ac\uc6a9\ud558\ub294 \uc0c1\ud669\uc744 \uc0dd\uac01\ud574 \ubcf4\uba74 \uadf8 \ub73b\uc744 \ub300\ucda9 \uc9d0\uc791\ud560 \uc218\ub3c4 \uc788\ub2e4. \ud558\uc9c0\ub9cc \uc2e0\uc870\uc5b4 \uc911\uc5d0 \ub110\ub9ac \uc54c\ub824\uc9c0\uc9c0 \uc54a\uc740 \ub9d0\uc740 \uce5c\uad6c\ub4e4\uc774 \uc124\uba85\uc744 \ud574 \uc918\uc57c \uaca8\uc6b0 \uc774\ud574\ud560 \uc218 \uc788\ub294 \uacbd\uc6b0\uac00 \ub9ce\ub2e4. \ud55c\uad6d\uc5b4\ub97c \uc0ac\ub791\ud558\ub294 \uc678\uad6d\uc778\uc73c\ub85c\uc11c \ub098\uc758 \ubc14\ub78c\uc740 \uc904\uc784\ub9d0\uc774\ub098 \uc2e0\uc870\uc5b4\ub97c \uc801\ub2f9\ud788 \uc0ac\uc6a9\ud588\uc73c\uba74 \uc88b\uaca0\ub2e4\ub294 \uac83\uc774\ub2e4."},{"id":"14_\uc77d\uae30_2","lesson":14,"text_number":2,"content":"(\uac00) \uac15\uc870\ubc95\uc5d0\ub294 \uc5ec\ub7ec \uac00\uc9c0\uac00 \uc788\ub2e4. \uc0ac\ub78c\ub4e4\uc740 '\ucd5c'\ub098 '\ucd08' \uac19\uc740 \ub9d0\uc744 \ub2e8\uc5b4 \uc55e\uc5d0 \ubd99\uc774\ub294 \ubc29\uc2dd\uc73c\ub85c \uc790\uc2e0\uc758 \uc0dd\uac01\uc744 \uac15\uc870\ud55c\ub2e4. \uc0ac\uc2e4 '\uc288\ud37c', '\uc6b8\ud2b8\ub77c', '\ucd08'\ub294 \uc9c0\ub098\uac04 \uc720\ud589\uc5b4\uc774\ub2e4. \uc9c0\uae08\uc740 '\ud575'\uc758 \uc2dc\ub300\uc778 \ub4ef\ud558\ub2e4.\n(\ub098) \uc80a\uc740 \uc0ac\ub78c\ub4e4\uc740 '\ud575\uc608\uc058\uace0', '\ud575\ub9db\uc788\ub294'\uc774\ub77c\ub294 \ud45c\ud604\uc744 \ub9c8\uad6c \ub9cc\ub4e4\uc5b4 \ub0b8\ub2e4. '\uac1c'\uc758 \ub110\ub9ac \uc54c\ub824\uc9c4 \ub73b\uc740 \uc4f8\ub370\uc5c6\ub294 \uac83, \uc9c8\uc774 \ub5a8\uc5b4\uc9c4\ub2e4\ub294 \ubd80\uc815\uc801\uc778 \uac83\uc774\uc5c8\ub2e4. \uadf8\ub7ec\ub098 \ud604\uc7ac\ub294 '\ubd80\uc815\uc801\uc778' \uc758\ubbf8\ub294 \uc0ac\ub77c\uc9c0\uace0 '\uc544\uc8fc', '\uac00\uc7a5'\uc758 \uc758\ubbf8\ub85c \uc4f0\uc778\ub2e4.\n(\ub2e4) '\uac1c'\ub098 '\ud575'\uacfc \uac19\uc740 \uc2e0\uc870\uc5b4 \uc0ac\uc6a9\uc5d0 \ubd80\uc815\uc801\uc778 \uc2dc\uac01\uc744 \uac00\uc9c4 \uc0ac\ub78c\ub4e4\ub3c4 \uc788\uc9c0\ub9cc \uc2e0\uc870\uc5b4\uac00 \ubd80\uc815\uc801\uc778 \uba74\ub9cc \uc788\ub294 \uac83\uc740 \uc544\ub2c8\ub2e4. '\uc6c3\ud504\ub2e4'\ub294 \uc6c3\uae30\uba74\uc11c\ub3c4 \uc2ac\ud504\ub2e4\ub294 \ud604\ub300\uc778\uc758 \uac10\uc815\uc744 \uc815\ud655\ud558\uac8c \ud45c\ud604\ud574 \uc900\ub2e4.\n(\ub77c) \uc9c0\ub098\uce5c \uac15\uc870 \ud45c\ud604\uc758 \uc0ac\uc6a9\uc740 \uc790\uc81c\ud558\uace0 \uac10\uc815\uc744 \uc544\ub984\ub2f5\uace0 \ud48d\ubd80\ud558\uac8c \ud45c\ud604\ud560 \ub9d0\uc744 \ucc3e\ub294 \uac83\uc740 \uc5b4\ub5a8\uae4c."},{"id":"15_\uc77d\uae30_1","lesson":15,"text_number":1,"content":"\ucd5c\uadfc \ud3ed\uc5fc, \uc7a6\uc740 \ud0dc\ud48d, \ud3ed\uc6b0 \ub4f1\uc73c\ub85c \uc778\ud574 \ub9ce\uc740 \ud53c\ud574\uac00 \ubc1c\uc0dd\ud558\uace0 \uc788\ub2e4. \uc11c\uc6b8\uc2dc\uc5d0\uc11c\ub294 \uc0dd\ud65c \uc18d\uc5d0\uc11c \uc27d\uac8c \uc2e4\ucc9c\ud560 \uc218 \uc788\ub294 '\uae30\ud6c4 \ud589\ub3d9 1.5\u2103'\ub77c\ub294 \uc571\uc744 \ub9cc\ub4e4\uc5b4\uc11c \ud64d\ubcf4\ud558\uace0 \uc788\ub2e4.\n\uc6b0\uc120 \ud734\ub300\ud3f0\uc5d0 \uc774 \uc571\uc744 \uc124\uce58\ud558\uace0 '\uac00\uae4c\uc6b4 \uac70\ub9ac\ub294 \uac78\uc5b4\uac00\uae30', '\uc7a5\uc744 \ubcfc \ub54c\ub294 \ube44\ub2d0\ubd09\uc9c0 \ub300\uc2e0 \uc7a5\ubc14\uad6c\ub2c8\ub97c \uc0ac\uc6a9\ud558\uae30' \ub4f1 \uc5ec\uae30\uc5d0\uc11c \uc81c\uc2dc\ud55c \uc5f4 \uac00\uc9c0 \ubc29\ubc95\uc744 \uc2e4\ucc9c\ud55c\ub2e4. \uadf8\ub7ec\uba74 \ucc38\uc5ec \uc815\ub3c4\uc5d0 \ub530\ub77c \uc138\uae08\uc744 \uae4e\uc544 \uc8fc\ub294 \ub4f1\uc758 \ub2e4\uc591\ud55c \ud61c\ud0dd\uc744 \uc81c\uacf5\ubc1b\uc744 \uc218 \uc788\ub2e4.\n\uc804\ubb38\uac00\ub4e4\uc740 \ud658\uacbd \ubcf4\ud638\ub97c \uc704\ud574 \ub300\ub2e8\ud55c \uac83\ub9cc \uc0dd\uac01\ud560 \uac83\uc774 \uc544\ub2c8\ub77c \uc791\uc740 \uc77c\ubd80\ud130 \uc2e4\ucc9c\ud574\uc57c \ud55c\ub2e4\uace0 \uc870\uc5b8\ud55c\ub2e4."},{"id":"15_\uc77d\uae30_2","lesson":15,"text_number":2,"content":"\uacbd\uc81c \ubc1c\uc804\uacfc \ub354\ubd88\uc5b4 \uc790\uc5f0\ud658\uacbd\uc774 \ud30c\uad34\ub418\uace0 \ud658\uacbd \uc624\uc5fc\ub3c4 \uac08\uc218\ub85d \uc2ec\uac01\ud574\uc9c0\uace0 \uc788\ub2e4. \ud2b9\ud788 \ubc14\ub2e4\uc758 \uc624\uc5fc \ubb38\uc81c\ub294 \uc6b0\ub9ac\uac00 \ubaa8\ub974\ub294 \uc0ac\uc774\uc5d0 \ub354\uc6b1 \uc2ec\uac01\ud574\uc9c0\uace0 \uc788\ub2e4.\n\uadf8\ub9b0\ud53c\uc2a4\uc5d0 \uc758\ud558\uba74 \ub9e4\ub144 \ubc14\ub2e4\uc5d0 \ubc84\ub824\uc9c0\ub294 \ud50c\ub77c\uc2a4\ud2f1 \uc4f0\ub808\uae30\uc758 \uc591\uc740 \uc57d 800\ub9cc \ud1a4\uc774\ub77c\uace0 \ud55c\ub2e4. \ub610\ud55c \uacf5\uc7a5 \ud3d0\uc218\ub098 \uc0dd\ud65c\ud558\uc218\ub85c \uc778\ud574 \uac15\uacfc \ubc14\ub2e4\uac00 \uc624\uc5fc\ub418\uace0 \uc788\ub2e4. \uae30\uc5c5\uc740 \ud3d0\uc218 \ucc98\ub9ac \ube44\uc6a9\uc744 \uc904\uc774\uae30 \uc704\ud574 \uadf8\ub0e5 \ubc14\ub2e4\uc5d0 \ud758\ub824\ubcf4\ub0b8\ub2e4.\n\uc774\ub7f0 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uae30 \uc704\ud574\uc11c\ub294 \uc6b0\ub9ac \uc2a4\uc2a4\ub85c\ub3c4 \ud658\uacbd \ubcf4\ud638\ub97c \uc704\ud574 \ub178\ub825\ud574\uc57c \ud55c\ub2e4. \uccab\uc9f8, \uc77c\ud68c\uc6a9\ud488\uc758 \uc0ac\uc6a9\uc744 \uc904\uc5ec\uc57c \ud55c\ub2e4. \ub458\uc9f8, \ube68\ub798\ub294 \ubaa8\uc544\uc11c \ud558\uace0 \uc0e4\uc6cc \uc2dc\uac04\uc744 \uc904\uc774\ub294 \ub4f1 \uc0dd\ud65c\ud558\uc218\ub97c \uc904\uc774\uae30 \uc704\ud55c \ub178\ub825\ub3c4 \ud544\uc694\ud558\ub2e4."},{"id":"16_\uc77d\uae30_1","lesson":16,"text_number":1,"content":"\uc5ec\uc218 \uc218\uc871\uad00\uc5d0 \ud640\ub85c \ub0a8\uc740 \ud770\uace0\ub798 \ubca8\ub8e8\uac00\ub97c \uc790\uc5f0\uc73c\ub85c \ub3cc\ub824\ubcf4\ub0b4\uc57c \ud55c\ub2e4\ub294 \uc8fc\uc7a5\uc774 \ub098\uc654\ub2e4. \ubca8\ub8e8\uac00\ub294 2008\ub144 \uc138\uacc4\uc790\uc5f0\ubcf4\uc804\uc5f0\ub9f9\uc5d0 \uc758\ud574 \uba78\uc885 \uc704\uae30\uc885\uc73c\ub85c \uc9c0\uc815\ub410\ub2e4. \uc9c0\ub09c \uba87 \ub144 \uc0ac\uc774\uc5d0 \uc5ec\uc218 \uc218\uc871\uad00\uc5d0\uc11c \uc0b4\ub358 \uc138 \ub9c8\ub9ac\uc758 \ubca8\ub8e8\uac00 \uc911 \ub450 \ub9c8\ub9ac\uac00 \uc8fd\uc5c8\ub2e4. \ub3d9\ubb3c \ubcf4\ud638 \ub2e8\uccb4\ub294 \uc6d0\ub798 \uc11c\uc2dd\uc9c0\uc778 \ubd81\uadf9\ud574\ub85c \ub3cc\ub824\ubcf4\ub0b4\uc57c \ud55c\ub2e4\uace0 \uc8fc\uc7a5\ud558\uace0 \uc788\ub2e4. \ud558\ub8e8\uc5d0 \uc218\ucc9c \ud0ac\ub85c\ubbf8\ud130\ub97c \uc774\ub3d9\ud558\ub294 \ubca8\ub8e8\uac00\ub97c \uc881\uc740 \uc218\uc871\uad00\uc5d0 \uac00\ub450\uba74 \uc2a4\ud2b8\ub808\uc2a4\ub85c \uc778\ud574 \uc77c\ucc0d \uc8fd\uc744 \uc218\ub3c4 \uc788\uae30 \ub54c\ubb38\uc774\ub2e4. \uadf8\ub7ec\ub098 \ud658\uacbd\uc758 \ubcc0\ud654\uc640 \uba39\uc774 \ubd80\uc871 \ub54c\ubb38\uc5d0 \ubca8\ub8e8\uac00\uac00 \uba78\uc885\ub420 \uac00\ub2a5\uc131\uc774 \uc788\uc73c\ubbc0\ub85c \uc218\uc871\uad00\uc5d0\uc11c \ubcf4\ud638\ud558\uace0 \uc778\uacf5\uc801\uc73c\ub85c \ubc88\uc2dd\uc2dc\ucf1c\uc57c \ud55c\ub2e4\ub294 \uc758\uacac\ub3c4 \uc788\ub2e4.\n2023\ub144 \ud604\uc7ac \uad6d\ub0b4 \uc218\uc871\uad00\uc5d0\uc11c\ub294 \ubca8\ub8e8\uac00\ub97c \ube44\ub86f\ud574 \ubaa8\ub450 \uc2a4\ubb3c\ud55c \ub9c8\ub9ac\uc758 \uace0\ub798\ub958\ub97c \ud0a4\uc6b0\uace0 \uc788\ub2e4."},{"id":"16_\uc77d\uae30_2","lesson":16,"text_number":2,"content":"\ud638\ub791\uc774\ub294 \ud55c\uad6d\uc758 \uc61b\ub0a0\uc774\uc57c\uae30\ub098 \uc18d\ub2f4\uc5d0 \uc790\uc8fc \ub4f1\uc7a5\ud560 \uc815\ub3c4\ub85c \ud55c\uad6d\uc778\uc5d0\uac8c \uce5c\uc219\ud55c \ub3d9\ubb3c\uc774\uc5c8\ub2e4. \ud558\uc9c0\ub9cc \uc9c0\uae08\uc740 \ub354 \uc774\uc0c1 \ud55c\uad6d\uc5d0\uc11c \ud638\ub791\uc774\ub97c \ubcfc \uc218 \uc5c6\uac8c \ub410\ub2e4.\n\ud55c\uad6d\ud638\ub791\uc774\ub97c \uc5f0\uad6c\ud558\ub294 \uc804\ubb38\uac00\uc5d0 \uc758\ud558\uba74 \ud55c\ubc18\ub3c4\uc5d0\uc11c \ud638\ub791\uc774\uc758 \uc218\uac00 \uc904\uae30 \uc2dc\uc791\ud55c \uac83\uc740 \uc870\uc120 \uc804\uae30\ubd80\ud130\ub77c\uace0 \ud55c\ub2e4. \ub18d\uc0ac\uc9d3\ub294 \ub545\uc774 \ub298\uace0 \ud638\ub791\uc774\uc758 \uc11c\uc2dd\uc9c0 \uba74\uc801\uc774 \uc904\uc5b4\ub4e4\uc5c8\ub2e4. \ud2b9\ud788 \uc77c\uc81c\uac15\uc810\uae30\uc5d0\ub294 \ud638\ub791\uc774\ub97c \ub9c8\uad6c \uc0ac\ub0e5\ud558\uace0 \uc7a1\uc544\ub4e4\uc600\ub2e4. \uacb0\uad6d 1922\ub144 \uacbd\uc8fc \ub300\ub355\uc0b0\uc5d0\uc11c \ub9c8\uc9c0\ub9c9 \ud55c\uad6d\ud638\ub791\uc774\uac00 \uc0ac\ub0e5\ub2f9\ud558\uba74\uc11c \ud55c\ubc18\ub3c4\uc5d0\uc11c \uc0ac\ub77c\uc84c\ub2e4.\n\uadf8\ub7ec\ub098 \ud55c\uad6d\ud638\ub791\uc774\uc640 \ub3d9\uc77c\ud55c \uc720\uc804\uc790\ub97c \uac00\uc9c4 \uc2dc\ubca0\ub9ac\uc544\ud638\ub791\uc774\uac00 \ub7ec\uc2dc\uc544 \uc5f0\ud574\uc8fc \uc9c0\uc5ed\uc5d0 400~500\uc5ec \ub9c8\ub9ac \uc815\ub3c4 \uc11c\uc2dd\ud558\uace0 \uc788\ub2e4. \ud55c\uad6d\uc5d0\uc11c\ub3c4 \uc11c\uc6b8\ub300\ud559\uad50 \uc218\uc758\ub300 \uc5f0\uad6c\uc6d0\ub4e4\uc774 \uc911\uc2ec\uc774 \ub41c \ub2e8\uccb4\uc5d0\uc11c \uc5f0\uad6c\uc640 \ucea0\ud398\uc778\uc744 \uc9c4\ud589\ud558\uace0 \uc788\ub2e4. \uadf8\ub7ec\ub098 \uacf5\uc2dd\uc801\uc73c\ub85c \uc815\ubd80\uc5d0 \uc758\ud574 \ucd94\uc9c4\ub418\uace0 \uc788\ub294 \uc815\ucc45\uc774\ub098 \uc5f0\uad6c\ub294 \uc5c6\ub2e4."},{"id":"17_\uc77d\uae30_1","lesson":17,"text_number":1,"content":"\ub300\ubd80\ubd84\uc758 \uc0ac\ub78c\ub4e4\uc740 \uacfc\ud559\uc774 \uc790\uc2e0\uacfc\ub294 \uad00\uacc4\uc5c6\ub294 \uac83\uc774\ub77c\uace0 \uc0dd\uac01\ud558\uc9c0\ub9cc \uc6b0\ub9ac\uc758 \uc0dd\ud65c\uc744 \uc798 \uc0b4\ud3b4\ubcf4\uba74 \uc6b0\ub9ac \uac00\uae4c\uc774\uc5d0 \uacfc\ud559\uc801\uc778 \ud604\uc0c1\ub4e4\uc774 \ub9ce\uc774 \uc788\uc74c\uc744 \uc54c\uac8c \ub420 \uac83\uc774\ub2e4. \ub9c8\ucc30\ub825\uc740 \ub450 \ubb3c\uac74\uc774 \ub2ff\uc558\uc744 \ub54c \uc6c0\uc9c1\uc784\uc744 \ubc29\ud574\ud558\ub294 \ud798\uc774\ub2e4. \uc608\ub97c \ub4e4\uc5b4 \uc2e0\ubc1c\uacfc \ubc14\ub2e5\uc774 \ub2ff\uc558\uc744 \ub54c \ub9c8\ucc30\ub825\uc774 \uc791\uc73c\uba74 \ubbf8\ub044\ub7ec\uc6cc\uc11c \uc798 \uac78\uc744 \uc218 \uc5c6\ub2e4. \uadf8\ub798\uc11c \uaca8\uc6b8\ucca0 \ub208\uc774 \uc654\uc744 \ub54c \ub9c8\ucc30\ub825\uc744 \ub192\uc5ec\uc11c \ub118\uc5b4\uc9c0\uc9c0 \uc54a\ub3c4\ub85d \uae38\uc5d0 \ubaa8\ub798\ub97c \ubfcc\ub9ac\ub294 \uac83\uc774\ub2e4.\n\ub098\ub294 \uacfc\ud559\uc790\ub85c\uc11c \ubcf4\ud1b5 \uc0ac\ub78c\ub4e4\uc774 \uc774\ud574\ud560 \uc218 \uc788\ub3c4\ub85d \uc26c\uc6b4 \ub9d0\uc744 \uc774\uc6a9\ud574 \uacfc\ud559 \ud604\uc0c1\uc744 \uc124\uba85\ud574\uc57c \ud55c\ub2e4\uace0 \uc0dd\uac01\ud55c\ub2e4. \uc774 \uae00\uc744 \ud1b5\ud574 \uc0ac\ub78c\ub4e4\uc774 \uacfc\ud559\uc5d0 \ub300\ud55c \ub450\ub824\uc6c0\uc744 \uadf9\ubcf5\ud558\uace0 \uacfc\ud559\uc774 \uc8fc\ub294 \uc990\uac70\uc6c0\uc744 \ub9ce\uc774 \uc54c\uac8c \ub420 \uc218 \uc788\uc73c\uba74 \uc88b\uaca0\ub2e4."},{"id":"17_\uc77d\uae30_2","lesson":17,"text_number":2,"content":"\uc815\uc804\uae30\uc758 \uc6d0\ub9ac\n\uaca8\uc6b8\uc774 \ub418\uba74 \uc815\uc804\uae30 \ub54c\ubb38\uc5d0 \ubd88\ud3b8\uc744 \ub290\ub07c\ub294 \uc0ac\ub78c\uc774 \uc801\uc9c0 \uc54a\ub2e4. \uc815\uc804\uae30\uac00 \ubaa8\uc5ec \uc788\ub294 \ubb3c\uac74\uc5d0 \ub2ff\uc558\uc744 \ub54c \uc774\ub9cc \uc624\ucc9c \ubcfc\ud2b8(V)\uc758 \uc804\uc555\uc774 \ubc1c\uc0dd\ud574\uc11c \uace0\ud1b5\uc744 \ub290\ub084 \uc218\ub3c4 \uc788\ub2e4. \uc815\uc804\uae30\ub294 \ud750\ub974\uc9c0 \uc54a\uace0 \uba38\ubb3c\ub7ec \uc788\ub294 \uc804\uae30\ub77c\ub294 \ub73b\uc774\uba70, \ub9c8\ucc30\uc5d0 \uc758\ud574 \uc0dd\uae30\uae30 \ub54c\ubb38\uc5d0 \ub9c8\ucc30 \uc804\uae30\ub77c\uace0\ub3c4 \ubd80\ub978\ub2e4.\n\uacf5\uae30 \uc911\uc5d0 \ud3ec\ud568\ub41c \ubb3c\uc740 \uc804\uae30\ub825\uc744 \uc5c6\uc560\ub294 \uc5ed\ud560\uc744 \ud558\uae30 \ub54c\ubb38\uc5d0 \uc2b5\ub3c4\uac00 \ub192\uc740 \uc5ec\ub984\ubcf4\ub2e4\ub294 \uac74\uc870\ud55c \uaca8\uc6b8\uc5d0 \uc815\uc804\uae30\uac00 \uc790\uc8fc \ubc1c\uc0dd\ud55c\ub2e4. \ub530\ub77c\uc11c \uc815\uc804\uae30\uac00 \uc790\uc8fc \ub290\uaef4\uc9c4\ub2e4\uba74 \ud06c\ub9bc\uc744 \ubc14\ub974\uac70\ub098 \ubb3c\uc744 \ub9ce\uc774 \ub9c8\uc154\uc11c \ubab8\uc774 \uac74\uc870\ud55c \uc0c1\ud0dc\uac00 \ub418\uc9c0 \uc54a\ub3c4\ub85d \ud558\ub294 \uac83\uc774 \uc88b\ub2e4.\n\uc815\uc804\uae30 \ud604\uc0c1\uc774 \uc2e4\uc0dd\ud65c\uc5d0 \ud65c\uc6a9\ub41c \uc608\ub85c \ubbf8\uc138 \uba3c\uc9c0\ub97c \ub9c9\uc544 \uc8fc\ub294 \uc77c\ud68c\uc6a9 \ub9c8\uc2a4\ud06c\uac00 \uc788\ub2e4. \ub9c8\uc2a4\ud06c \uc548\uc5d0\ub294 \uc815\uc804\uae30\ub97c \uc77c\uc73c\ud0a4\ub294 \ud544\ud130\uac00 \ud3ec\ud568\ub418\uc5b4 \uc788\ub2e4. \uc815\uc804\uae30 \ub355\ubd84\uc5d0 \ubbf8\uc138 \uba3c\uc9c0\uac00 \ub9c8\uc2a4\ud06c\uc5d0 \ubd99\uc5b4\uc11c \uc0ac\ub78c\uc758 \ud638\ud761\uae30\ub85c \ub4e4\uc5b4\uac00\uc9c0 \ubabb\ud558\uac8c \ub418\ub294 \uac83\uc774\ub2e4."},{"id":"18_\uc77d\uae30_1","lesson":18,"text_number":1,"content":"\u2022 \uc774\ubc88 \ub300\ud68c\uc5d0\uc11c 1\ub4f1\uc744 \ud55c \uc601\uc0c1\uc774 \ub0b4\uc6a9\ubfd0\ub9cc \uc544\ub2c8\ub77c \uc5f0\ucd9c\uacfc \ud55c\uad6d\uc5b4\ub3c4 \ud6cc\ub96d\ud558\ub2e4\uace0 \ud3c9\uac00\ubc1b\uc558\ub294\ub370 \uc18c\uac10\uc740 \uc5b4\ub5a4\uac00?\n\uc601\ud654\uac10\ub3c5\uc774 \uafc8\uc778\ub370 \uadf8\ub3d9\uc548 \ud55c \ubc88\ub3c4 \uc0c1\uc744 \ubc1b\uc9c0 \ubabb\ud588\ub2e4. \uc774\ubc88\uc5d0 \uc2e4\ud328\ud558\uba74 \uafc8\uc744 \ud3ec\uae30\ud560 \uc0dd\uac01\uc73c\ub85c \ub3c4\uc804\ud588\ub2e4. \uc601\ud654\uac10\ub3c5\uc73c\ub85c\uc11c\uc758 \uac00\ub2a5\uc131\uc744 \uc778\uc815\ubc1b\uc558\uc744 \ubfd0\ub9cc \uc544\ub2c8\ub77c \ud55c\uad6d\uc5b4 \uc2e4\ub825\ub3c4 \uae0d\uc815\uc801\uc73c\ub85c \ud3c9\uac00\ubc1b\uc544 \uae30\uc058\ub2e4.\n\u2022 \uc601\uc0c1\uc744 \ub9cc\ub4e4\uba74\uc11c \ud798\ub4e4\uc5c8\ub358 \uc810, \uc88b\uc558\ub358 \uc810\uc740 \ubb34\uc5c7\uc778\uac00?\n\uccab \uc7a5\uba74\uc744 \ucc0d\ub358 \ub0a0 \uc0dd\uac01\ub300\ub85c \ucd2c\uc601\uc774 \ub418\uc9c0 \uc54a\uc544\uc11c \uace0\uc0dd\ud588\uc5c8\ub2e4. \ucc98\uc74c\uc5d0\ub294 \uc8fc\uc778\uacf5 \uc5ed\ud560\uc744 \ub9e1\uc740 \uce5c\uad6c\uac00 \ub108\ubb34 \uae34\uc7a5\ud574\uc11c \ub9d0\uc744 \uc81c\ub300\ub85c \ubabb \ud588\ub294\ub370 \ub2e4\ub978 \uce5c\uad6c\ub4e4\uc774 \uc606\uc5d0\uc11c \uae34\uc7a5\uc744 \ud480\uc5b4 \uc918\uc11c \ubb34\uc0ac\ud788 \ucd2c\uc601\uc744 \ub9c8\uce60 \uc218 \uc788\uc5c8\ub2e4. \uc6b0\ub9ac\ub294 \uc774\ub807\uac8c \ud798\ub4e4 \ub54c\ub9c8\ub2e4 \ud798\uc744 \ud569\uccd0 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uace4 \ud588\ub2e4.\n\u2022 \uc55e\uc73c\ub85c\uc758 \uacc4\ud68d\uc740?\n\uc9c0\uae08 \uc0dd\uac01\ud558\uace0 \uc788\ub294 \uc791\ud488\uc774 \uc788\ub294\ub370 \ub0b4\ub144\uc5d0\ub294 \uc601\ud654 \ucd2c\uc601\uc744 \uc2dc\uc791\ud558\uba74 \uc88b\uaca0\ub2e4. \uadf8\ub9ac\uace0 \uc774\ubc88 \uacbd\ud5d8\uc744 \uc0b4\ub824\uc11c \uc55e\uc73c\ub85c \ub2e4\ub978 \uc0ac\ub78c\ub4e4\uacfc \uc18c\ud1b5\ud558\ub294 \uc601\ud654\uac10\ub3c5\uc774 \ub418\uace0 \uc2f6\ub2e4."},{"id":"10_\uc77d\uae30_\uc720\ud615H","lesson":10,"text_number":90,"content":"\uce35\uac04 \uc18c\uc74c \uac08\ub4f1 \uc2ec\ud654\u2026 \ubc30\ub824 \uc783\uc740 '\uc774\uc6c3\uc0ac\ucd0c'"},{"id":"11_\uc77d\uae30_\uc720\ud615H","lesson":11,"text_number":90,"content":"\uc0c1\uc0ac \ubd80\ud0c1\uc5d0 '\uc544\ub2c8\uc694' \ubabb \ud558\ub294 \uc2e0\uc785\uc0ac\uc6d0, \uc5c5\ubb34 \uacfc\ubd80\ud558 \ube44\uc0c1"},{"id":"12_\uc77d\uae30_\uc720\ud615H","lesson":12,"text_number":90,"content":"\ub098\uc05c \uc9d3\uc740 \ubc18\ub4dc\uc2dc \ub4e4\ud1b5\ub09c\ub2e4\u2026 \uc815\uc9c1\ud55c \uc0b6\uc774 \uacb0\uad6d \uc774\uae34\ub2e4"},{"id":"13_\uc77d\uae30_\uc720\ud615H","lesson":13,"text_number":90,"content":"\uae38\uac70\ub9ac \ud761\uc5f0 \uad6c\uc5ed \uc124\uce58 \ucc2c\ubc18 \ud33d\ud33d\u2026 \ubcf4\ud589\uad8c vs \ud761\uc5f0\uad8c"},{"id":"14_\uc77d\uae30_\uc720\ud615H","lesson":14,"text_number":90,"content":"\uc138\ub300 \uac04 \uc18c\ud1b5 \uac00\ub85c\ub9c9\ub294 \uc2e0\uc870\uc5b4\u2026 \"\ubb34\uc2a8 \ub9d0\uc778\uc9c0 \ud558\ub098\ub3c4 \ubab0\ub77c\uc694\""},{"id":"15_\uc77d\uae30_\uc720\ud615H","lesson":15,"text_number":90,"content":"\uc77c\ud68c\uc6a9 \ucef5 \uc0ac\uc6a9 \uc81c\ud55c \uac15\ud654\u2026 \"\ubd88\ud3b8\ud574\ub3c4 \uc9c0\uad6c \uc704\ud574 \ub3d9\ucc38\""},{"id":"16_\uc77d\uae30_\uc720\ud615H","lesson":16,"text_number":90,"content":"\uc720\uae30\uacac \ubcf4\ud638\uc18c \ud3ec\ud654 \uc0c1\ud0dc\u2026 \uc0ac\uc9c0 \ub9d0\uace0 \uc785\uc591\ud558\ub294 \ubb38\ud654 \uc808\uc2e4"},{"id":"17_\uc77d\uae30_\uc720\ud615H","lesson":17,"text_number":90,"content":"\uaca8\uc6b8\ucca0 \ubd88\uccad\uac1d '\uc815\uc804\uae30'\u2026 \uc2b5\ub3c4 \uc870\uc808\ub85c \uc7a1\ub294\ub2e4"},{"id":"18_\uc77d\uae30_\uc720\ud615H","lesson":18,"text_number":90,"content":"\uace0\ud5a5 \ubc29\ubb38\uac1d \uae09\uc99d\u2026 \uc78a\uc9c0 \ubabb\ud560 '\uadf8\ub54c \uadf8 \uc2dc\uc808' \ucd94\uc5b5 \uc5ec\ud589"},{"id":"10_\uc77d\uae30_\uc720\ud615I","lesson":10,"text_number":91,"content":"\ub098\uc758 \uc791\uc740 \uc591\ubcf4\uac00 \ubaa8\ub450\ub97c \uc6c3\uac8c \ud569\ub2c8\ub2e4.\n\uba3c\uc800 \ub2e4\uac00\uac00\ub294 \ub530\ub73b\ud55c \ub9c8\uc74c\uc744 \ubcf4\uc5ec\uc8fc\uc138\uc694."},{"id":"11_\uc77d\uae30_\uc720\ud615I","lesson":11,"text_number":91,"content":"\ub2e4\ub978 \uc0ac\ub78c\uc758 \ub9d0\uc744 \ub05d\uae4c\uc9c0 \ub4e3\uace0, \ub0b4 \uac10\uc815\uc740 \uc194\uc9c1\ud558\uac8c \ud45c\ud604\ud558\uc138\uc694.\n\uc9c4\uc2ec\uc774 \ub2f4\uae34 \ub300\ud654\uac00 \uad00\uacc4\ub97c \ub354 \uae4a\uac8c \ub9cc\ub4ed\ub2c8\ub2e4."},{"id":"12_\uc77d\uae30_\uc720\ud615I","lesson":12,"text_number":91,"content":"\ucc29\ud55c \ud765\ubd80\ub294 \ub9c8\uce68\ub0b4 \ud070 \ubcf5\uc744 \ubc1b\uc558\uace0, \uc695\uc2ec \ub9ce\uc740 \ub180\ubd80\ub294 \uacb0\uad6d \ubc8c\uc744 \ubc1b\uc558\uc2b5\ub2c8\ub2e4.\n\uc61b\uc774\uc57c\uae30 \uc18d \uac00\ub974\uce68\uc740 \uc624\ub298\ub3c4 \uc6b0\ub9ac \uacc1\uc5d0 \uc788\uc2b5\ub2c8\ub2e4."},{"id":"13_\uc77d\uae30_\uc720\ud615I","lesson":13,"text_number":91,"content":"\uc544\uc774\ub4e4\uc758 \ucd9c\uc785\uc744 \ub9c9\ub294 \uc2dd\ub2f9\uc774 \ub298\uace0 \uc788\uc2b5\ub2c8\ub2e4.\n\uc601\uc5c5\uc758 \uc790\uc720\uc77c\uae4c\uc694, \uc544\ub2c8\uba74 \uba85\ubc31\ud55c \ucc28\ubcc4\uc77c\uae4c\uc694?"},{"id":"14_\uc77d\uae30_\uc720\ud615I","lesson":14,"text_number":91,"content":"\uc5b4\ub978\ub4e4\uc740 \uc54c\uc544\ub4e3\uc9c0 \ubabb\ud558\ub294 \uc904\uc784\ub9d0\uc774 \ub108\ubb34 \ub9ce\uc2b5\ub2c8\ub2e4.\n\uc544\ub984\ub2f5\uace0 \ubc14\ub978 \uc6b0\ub9ac\ub9d0\uc744 \uc9c0\ucf1c\ub098\uac11\uc2dc\ub2e4."},{"id":"15_\uc77d\uae30_\uc720\ud615I","lesson":15,"text_number":91,"content":"\uc77c\ud68c\uc6a9 \ucef5 \ub300\uc2e0 \uac1c\uc778 \ud140\ube14\ub7ec\ub97c \uc0ac\uc6a9\ud574 \ubcf4\uc138\uc694.\n\uc791\uc740 \uc2e4\ucc9c\uc774 \ud478\ub978 \uc232\uacfc \ubc14\ub2e4\ub97c \uc0b4\ub9b4 \uc218 \uc788\uc2b5\ub2c8\ub2e4."},{"id":"16_\uc77d\uae30_\uc720\ud615I","lesson":16,"text_number":91,"content":"\uadc0\uc5fd\ub2e4\ub294 \uc774\uc720\ub9cc\uc73c\ub85c \ud0a4\uc6b0\uae30 \uc2dc\uc791\ud574\uc11c\ub294 \uc548 \ub429\ub2c8\ub2e4.\n\ub9e4\uc77c \ubc25\uc744 \uc8fc\uace0 \uc544\ud508 \uacf3\ub3c4 \uc0b4\ud3b4\uc57c \ud558\ub294 \uc18c\uc911\ud55c \uc0dd\uba85\uc785\ub2c8\ub2e4."},{"id":"17_\uc77d\uae30_\uc720\ud615I","lesson":17,"text_number":91,"content":"\ubb3c\uac74\uc744 \ub9cc\uc9c8 \ub54c \ucc0c\ub9bf\ud558\uac8c \ub290\uaef4\uc9c0\ub294 \uac83\uc740 \uc6b0\ub9ac \uc8fc\ubcc0 \uc5b4\ub514\uc11c\ub098 \uc77c\uc5b4\ub098\ub294 \ud604\uc0c1\uc785\ub2c8\ub2e4.\n\uacf5\uae30\uac00 \uac74\uc870\ud574\uc9c0\ub294 \uaca8\uc6b8\ucca0\uc5d0 \ud2b9\ud788 \uc790\uc8fc \uacbd\ud5d8\ud560 \uc218 \uc788\uc5b4\uc694."},{"id":"18_\uc77d\uae30_\uc720\ud615I","lesson":18,"text_number":91,"content":"\ube5b\ubc14\ub79c \uc0ac\uc9c4 \uc18d \uc61b \uce5c\uad6c\ub4e4\uc758 \ud658\ud55c \uc6c3\uc74c,\n\uadf8 \uc2dc\uc808\uc758 \ub530\ub73b\ud55c \uae30\uc5b5\uc774 \uc624\ub298\uc744 \uc704\ub85c\ud569\ub2c8\ub2e4."}],"questions":[{"id":"10_\uc77d\uae30_2_1","lesson":10,"domain":"\uc77d\uae30","text_number":2,"passage_id":"10_\uc77d\uae30_2","type":"\uc720\ud615G","question":"\uc774 \uae00\uc5d0\uc11c \uc54c \uc218 \uc5c6\ub294 \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"","options":["\uc8fc\uc778\uacf5\uc774 \ud0dc\uad8c\ub3c4\ub97c \ucc98\uc74c \uc2dc\uc791\ud55c \uc2dc\uae30","\uc8fc\uc778\uacf5\uc774 \uc62c\ub9bc\ud53d\uc5d0\uc11c \ud68d\ub4dd\ud55c \uba54\ub2ec\uc758 \uc885\ub958","\uc8fc\uc778\uacf5\uc774 2018\ub144\uc5d0 \ubd80\uc0c1\uc744 \ub2f9\ud558\uac8c \ub41c \uad6c\uccb4\uc801\uc778 \uc774\uc720","\uc8fc\uc778\uacf5\uc774 \ucc98\uc74c\uc73c\ub85c \uad6d\uc81c \ub300\ud68c\uc5d0\uc11c \uc6b0\uc2b9\uc744 \ucc28\uc9c0\ud55c \uc5f0\ub3c4"],"answer":2,"explanation":"2018\ub144\uc5d0 \ubd80\uc0c1\uc744 \ub2f9\ud588\ub2e4\ub294 \uc0ac\uc2e4\ub9cc \ub098\uc640 \uc788\uc744 \ubfd0, \ubd80\uc0c1\uc758 \uad6c\uccb4\uc801\uc778 \uc6d0\uc778\uc740 \uc5b8\uae09\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4."},{"id":"10_\uc77d\uae30_2_2","lesson":10,"domain":"\uc77d\uae30","text_number":2,"passage_id":"10_\uc77d\uae30_2","type":"\uc720\ud615C","question":"( )\uc5d0 \ub4e4\uc5b4\uac08 \ub0b4\uc6a9\uc73c\ub85c \uac00\uc7a5 \uc54c\ub9de\uc740 \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"\"\ubb3c\uc740 100\u00b0C\uac00 \ub418\uc5b4\uc57c \ub053\uc2b5\ub2c8\ub2e4. \ud3ec\uae30\ud558\uace0 \uc2f6\uc5c8\ub358 \uc801\uc774 \ub9ce\uc9c0\ub9cc \uadf8\ub54c\ub9c8\ub2e4 \uc9c0\uae08\uc774 ( ) \uc21c\uac04\uc774\ub77c\uace0 \uc0dd\uac01\ud588\uc2b5\ub2c8\ub2e4.\"","options":["\ud6c8\ub828\uc744 \ucc98\uc74c \uc2dc\uc791\ud574\uc57c \ud558\ub294","\uc131\uacf5\uc5d0 \uac00\uc7a5 \uac00\uae4c\uc6cc\uc9c4","\ubd80\uc0c1\uc744 \ud2b9\ubcc4\ud788 \uc870\uc2ec\ud574\uc57c \ud558\ub294","\uc8fc\ubcc0\uc758 \ub3c4\uc6c0\uc744 \ubc1b\uc544\uc57c \ud558\ub294"],"answer":1,"explanation":"\ud3ec\uae30\ud558\uace0 \uc2f6\uc740 \uc21c\uac04\uc774 \uace7 \uc131\uacf5\uc774 \uc784\ubc15\ud55c '100\u00b0C \uc9c1\uc804'\uc784\uc744 \uac15\uc870\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4."},{"id":"10_\uc77d\uae30_2_3","lesson":10,"domain":"\uc77d\uae30","text_number":2,"passage_id":"10_\uc77d\uae30_2","type":"\uc720\ud615D","question":"\uc774 \uae00\uc758 \uc81c\ubaa9\uc73c\ub85c \uc54c\ub9de\uc740 \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"","options":["\ud0dc\uad8c\ub3c4 \uae30\uc220\uc744 \ube60\ub974\uac8c \uc775\ud788\ub294 \ubc29\ubc95","\uad6d\uc81c \ub300\ud68c\uc640 \uc62c\ub9bc\ud53d \uacbd\uae30\uc758 \ucc28\uc774\uc810","\ud3ec\uae30\ud558\uc9c0 \uc54a\ub294 \uc778\ub0b4\uac00 \ub9cc\ub4e0 \uc131\uacf5\uc758 \uacb0\uc2e4","\uc6b4\ub3d9\uc120\uc218\uc5d0\uac8c \uac00\uc7a5 \uc704\ud5d8\ud55c \ubd80\uc0c1 \ubc29\uc9c0\ubc95"],"answer":2,"explanation":"\ubd80\uc0c1\uc774\ub77c\ub294 \uc2dc\ub828 \uc18d\uc5d0\uc11c\ub3c4 \ud3ec\uae30\ud558\uc9c0 \uc54a\uace0 \uc778\ub0b4\ud558\uba70 \ud6c8\ub828\ud558\uc5ec \uacb0\uad6d \uacb0\uc2e4\uc744 \ub9fa\uc740 \uc120\uc218\uc758 \uacbd\ud5d8\uc744 \ub2f4\uace0 \uc788\uc2b5\ub2c8\ub2e4."},{"id":"10_\uc77d\uae30_\uc720\ud615H_1","lesson":10,"domain":"\uc77d\uae30","text_number":90,"passage_id":"10_\uc77d\uae30_\uc720\ud615H","type":"\uc720\ud615H","question":"\ub2e4\uc74c \uc2e0\ubb38 \uae30\uc0ac \uc81c\ubaa9\uc744 \uac00\uc7a5 \uc798 \uc124\uba85\ud55c \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"","options":["\uc774\uc6c3\uc744 \ubc30\ub824\ud558\ub294 \ub9c8\uc74c\uc774 \uc0ac\ub77c\uc9c0\uba74\uc11c \uce35\uac04 \uc18c\uc74c\uc73c\ub85c \uc778\ud55c \uac08\ub4f1\uc774 \uc2ec\ud574\uc9c0\uace0 \uc788\ub2e4.","\uce35\uac04 \uc18c\uc74c\uc744 \uc904\uc774\uae30 \uc704\ud574 \uc774\uc6c3\uc0ac\ucd0c\ub4e4\uc774 \uc11c\ub85c \uc591\ubcf4\ud558\uace0 \u e30_1_3","lesson":11,"domain":"\uc77d\uae30","text_number":1,"passage_id":"11_\uc77d\uae30_1","type":"\uc720\ud615C","question":"( )\uc5d0 \ub4e4\uc5b4\uac08 \ub0b4\uc6a9\uc73c\ub85c \uac00\uc7a5 \uc54c\ub9de\uc740 \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"\uac70\uc808\ud558\uba74 \ub3d9\ub8cc\uc640 \uc5b4\uc0c9\ud574\uc9c8\uae4c \ubd10 \uac71\uc815\ud558\uba70 \ub0a8\ub4e4\uc758 \ub9d0\uc744 \ubaa8\ub450 \ub4e4\uc5b4\uc8fc\ub294 \uc0ac\ub78c\ub4e4\uc740 \uacb0\uad6d ( ) \ub418\uc5b4 \uc0ac\ud68c\uc0dd\ud65c\uc5d0 \uc5b4\ub824\uc6c0\uc744 \uacaa\uae30\ub3c4 \ud569\ub2c8\ub2e4.","options":["\ub2e4\ub978 \uc0ac\ub78c\uacfc \ub354 \uce5c\ud558\uac8c","\ub098 \uc790\uc2e0\uc758 \ubaa8\uc2b5\uc744 \uc783\uac8c","\uad50\uc218\ub2d8\uaed8 \uce6d\ucc2c\uc744 \ubc1b\uac8c","\uac70\uc808\ud558\ub294 \ubc29\ubc95\uc744 \ubc30\uc6b0\uac8c"],"answer":1,"explanation":"\ub0a8\ub4e4\uc758 \ub9d0\uc744 \ubaa8\ub450 \ub4e4\uc5b4\uc8fc\ub2e4\uac00 \uc0dd\uae30\ub294 \ubd80\uc815\uc801\uc778 \uacb0\uacfc\uc778 '\ub098 \uc790\uc2e0\uc740 \uc5c6\uc5b4\uc9c0\uace0'\ub97c \ucd94\ub860\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4."},{"id":"11_\uc77d\uae30_3_1","lesson":11,"domain":"\uc77d\uae30","text_number":3,"passage_id":"11_\uc77d\uae30_3","type":"\uc720\ud615A","question":"\uae00\uc758 \ub0b4\uc6a9\uacfc \uac19\uc740 \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"","options":["\uc0c1\ub300\ubc29\uc758 \uc758\uacac\uc774 \ub098\uc640 \ub2e4\ub97c \ub54c\ub294 \uc989\uc2dc \uc798\ubabb\ub41c \uc810\uc744 \uc9c0\uc801\ud574\uc57c \ud55c\ub2e4.","\ubb34\ub9ac\ud55c \ubd80\ud0c1\uc774\ub77c\ub3c4 \uc77c\ub2e8 \ub4e4\uc5b4\uc8fc\ub294 \uac83\uc774 \uc88b\uc740 \uad00\uacc4\ub97c \uc720\uc9c0\ud558\ub294 \ube44\uacb0\uc774\ub2e4.","\uc717\uc0ac\ub78c\uc758 \uc9c0\uc2dc\uac00 \uc774\ud574\ub418\uc9c0 \uc54a\uc744 \ub54c\ub294 \uc9c8\ubb38\uc744 \ud1b5\ud574 \uc815\ud655\ud55c \uc758\ub3c4\ub97c \ud30c\uc545\ud574\uc57c \ud55c\ub2e4.","\ub300\ud654\ud560 \ub54c \uc0c1\ub300\ub ","type":"\ubb38\ubc95B","question":"( ) \uc548\uc5d0 \uac00\uc7a5 \uc54c\ub9de\uc740 \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"\uac00: \uc8fc\ub9d0\uc778\ub370 \uc9d1\uc5d0\uc11c \ud154\ub808\ube44\uc804\uc774\ub098 \ubcfc\uae4c\uc694?\n\ub098: \ub0a0\uc528\ub3c4 \uc88b\uc740\ub370 \uc9d1\uc5d0\ub9cc ( ) \uac00\uae4c\uc6b4 \uacf5\uc6d0\uc774\ub77c\ub3c4 \uc0b0\ucc45\ud558\ub7ec \uac00\uc694.","options":["\uc788\uc744 \uac8c \uc544\ub2c8\ub77c","\uc788\uc744 \ubc14\uc5d0\uc57c","\uc788\uc73c\ub824\ub358 \ucc38\uc5d0","\uc788\uae30 \ub9c8\ub828\uc774\ub77c\uc11c"],"answer":0,"explanation":"\uc55e\uc758 \ub0b4\uc6a9\uc744 \ubd80\uc815\ud558\uace0 \uadf8 \ub300\uc2e0 \ub2e4\ub978 \ub0b4\uc6a9\uc744 \uc81c\uc548\ud558\ub294 '-\uc744 \uac8c \uc544\ub2c8\ub77c'\uac00 \uc801\uc808\ud569\ub2c8\ub2e4."},{"id":"15_\ubb38\ubc95_0_5","lesson":15,"domain":"\ubb38\ubc95","text_number":0,"passage_id":"","type":"\ubb38\ubc95C","question":"( ) \uc548\uc5d0 \ub4e4\uc5b4\uac08 \uc218 \uc5c6\ub294 \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"\uadf8\ub807\uac8c \ub9e4\uc77c \ubc24\uc744 \uc0c8\uc6cc \uac00\uba70 \ubb34\ub9ac\ud558\uac8c \uc77c\uc744 ( ) \uacb0\uad6d \uc4f0\ub7ec\uc838\uc11c \ubcd1\uc6d0\uc5d0 \uc785\uc6d0\ud558\uac8c \ub420 \uac70\uc608\uc694.","options":["\ud558\ub2e4\uac00\ub294","\ud558\ub294 \ub0a0\uc5d0\ub294","\uacc4\uc18d \ud558\uba74","\ud560 \ubc14\uc5d0\uc57c"],"answer":3,"explanation":"'-\uc744 \ubc14\uc5d0\uc57c'\ub294 \ub450 \uc0c1\ud669 \uc911 \ud558\ub098\ub97c \uc120\ud0dd\ud558\ub294 \uc758\ubbf8\uc774\ubbc0\ub85c \ubd80\uc815\uc801\uc778 \uacb0\uacfc\ub97c \uacbd\uace0\ud558\ub294 \ub9e5\ub77d\uc5d0 \uc5b4\uc0c9\ud569\ub2c8\ub2e4."},{"id":"15_\ubb38\ubc95_0_6","lesson":15,"domain":"\ubb38\ubc95","text_number":0,"passage_id":"","type":"\ubb38\ubc95C","question":"( ) \uc548\uc5d0 \ub4e4\uc5b4\uac08 \uc218 \uc5c6\ub294 \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"\ub0b4\uac00 \uc7a0\uae50 \ud654\uc7a5\uc2e4\uc5d0 ( ) \uce5c\uad6c\ub4e4\uc774 \ub0b4 \ucee4\ud53c\ub97c \ub2e4 \ub9c8\uc154 \ubc84\ub838\ub2e4.","options":["\uac04 \uc0ac\uc774\uc5d0","\uac04 \ub3d9\uc548\uc5d0","\uac00 \uc788\ub294 \ub3d9\uc548","\uac00\ub294 \ud1b5\uc5d0"],"answer":3,"explanation":"'-\ub294 \ud1b5\uc5d0'\ub294 \ubcf5\uc7a1\ud55c \uc0c1\ud669\uc774 \uc6d0\uc778\uc774 \ub420 \ub54c \uc4f0\uc774\ubbc0\ub85c \uc2dc\uac04\uc801 \ud2c8\uc744 \ub098\ud0c0\ub0b4\ub294 \ub9e5\ub77d\uc5d0\ub294 \ubd80\uc801\uc808\ud569\ub2c8\ub2e4."},{"id":"15_\ubb38\ubc95_0_7","lesson":15,"domain":"\ubb38\ubc95","text_number":0,"passage_id":"","type":"\ubb38\ubc95D","question":"\ub2e4\uc74c \uc911 \ud55c \ubb38\uc7a5\uc73c\ub85c \ub9de\uac8c \uc5f0\uacb0\ub41c \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"\uac11\uc791\uc2a4\ub7ec\uc6b4 \ud3ed\uc124 / \ub3c4\ub85c\uac00 \ud1b5\uc81c\ub418\ub2e4 / \ucd9c\uadfc\uae38 \uad50\ud1b5 \ub300\ub780\uc774 \ubc1c\uc0dd\ud588\ub2e4","options":["\uac11\uc791\uc2a4\ub7ec\uc6b4 \ud3ed\uc124\uce58\uace0 \ub3c4\ub85c\uac00 \ud1b5\uc81c\ub418\uc5b4\uc11c \ucd9c\uadfc\uae38 \uad50\ud1b5 \ub300\ub780\uc774 \ubc1c\uc0dd\ud588\ub2e4.","\uac11\uc791\uc2a4\ub7ec\uc6b4 \ud3ed\uc124\uc5d0 \ube44\ud574\uc11c \ub3c4\ub85c\uac00 \ud1b5\uc81c\ub418\uc5b4\uc11c \ucd9c\uadfc\uae38 \uad50\ud1b5 \ub300\ub780\uc774 \ubc1c\uc0dd\ud588\ub2e4.","\uac11\uc791\uc2a4\ub7ec\uc6b4 \ud3ed\uc124\ub85c \uc778\ud574 \ub3c4\ub85c\uac00 \ud1b5\uc81c\ub418\uc5b4\uc11c \ucd9c\uadfc\uae38 \uad50\ud1b5 \ub300\ub780\uc774 \ubc1c\uc0dd\ud588\ub2e4.","\uac11\uc791\uc2a4\ub7ec\uc6b4 \ud3ed\uc124\uacfc \ub2ec\ub9ac \ub3c4\ub85c\uac00 \ud1b5\uc81c\ub418\uc5b4\uc11c \ucd9c\uadfc\uae38 \uad50\ud1b5 \ub300\ub780\uc774 \ubc1c\uc0dd\ud588\ub2e4."],"answer":2,"explanation":"\uc0ac\uac74\uc758 \uc6d0\uc778\uc774\ub098 \uc774\uc720\ub97c \uaca9\uc2dd \uc788\uac8c \ud45c\ud604\ud558\ub294 '\uba85\uc0ac+\uc73c\ub85c/\ub85c \uc778\ud574(\uc11c)'\ub97c \uc0ac\uc6a9\ud558\ub294 \uac83\uc774 \uac00\uc7a5 \uc62c\ubc14\ub985\ub2c8\ub2e4."},{"id":"15_\ubb38\ubc95_0_8","lesson":15,"domain":"\ubb38\ubc95","text_number":0,"passage_id":"","type":"\ubb38\ubc95D","question":"\ub2e4\uc74c \uc911 \ud55c \ubb38\uc7a5\uc73c\ub85c \ub9de\uac8c \uc5f0\uacb0\ub41c \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"\ubaa8\ub974\ub294 \uac83\uc744 \ud63c\uc790 \uace0\ubbfc\ud558\ub2e4 / \uc120\uc0dd\ub2d8\uaed8 \uc5ec\ucb64\ubcf4\ub2e4 / \ud558\uc138\uc694","options":["\ubaa8\ub974\ub294 \uac83\uc744 \ud63c\uc790 \uace0\ubbfc\ud558\ub294 \ub370\ub2e4\uac00 \uc120\uc0dd\ub2d8\uaed8 \uc5ec\ucb64\ubcf4\ub3c4\ub85d \ud558\uc138\uc694.","\ubaa8\ub974\ub294 \uac83\uc744 \ud63c\uc790 \uace0\ubbfc\ud560 \ubfd0\ub9cc \uc544\ub2c8\ub77c \uc120\uc0dd\ub2d8\uaed8 \uc5ec\ucb64\ubcf4\ub3c4\ub85d \ud558\uc138\uc694.","\ubaa8\ub974\ub294 \uac83\uc744 \ud63c\uc790 \uace0\ubbfc\ud560 \uac8c \uc544\ub2c8\ub77c \uc120\uc0dd\ub2d8\uaed8 \uc5ec\ucb64\ubcf4\ub3c4\ub85d \ud558\uc138\uc694.","\ubaa8\ub974\ub294 \uac83\uc744 \ud63c\uc790 \uace0\ubbfc\ud558\uae30\ub294\ucee4\ub155 \uc120\uc0dd\ub2d8\uaed8 \uc5ec\ucb64\ubcf4\ub3c4\ub85d \ud558\uc138\uc694."],"answer":2,"explanation":"\uc55e\uc758 \ud589\ub3d9 \ub300\uc2e0 \ub4a4\uc758 \ub300\uc548\uc744 \uad8c\uc720\ud558\ub294 '-\uc744 \uac8c \uc544\ub2c8\ub77c'\ub97c \uc0ac\uc6a9\ud558\uc5ec \uc5f0\uacb0\ud558\ub294 \uac83\uc774 \uac00\uc7a5 \uc801\uc808\ud569\ub2c8\ub2e4."},{"id":"16_\uc77d\uae30_1_1","lesson":16,"domain":"\uc77d\uae30","text_number":1,"passage_id":"16_\uc77d\uae30_1","type":"\uc720\ud615A","question":"\uae00\uc758 \ub0b4\uc6a9\uacfc \uac19\uc740 \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"","options":["\uc5ec\uc218 \uc218\uc871\uad00\uc5d0\uc11c \uc9c0\ub0b4\ub358 \uc138 \ub9c8\ub9ac\uc758 \ubca8\ub8e8\uac00\ub294 \ud604\uc7ac \ubaa8\ub450 \ubd81\uadf9\ud574\ub85c \ub3cc\uc544\uac14\ub2e4.","\ubca8\ub8e8\uac00\ub294 \ud558\ub8e8\uc5d0 \uc218\ucc9c \ud0ac\ub85c\ubbf8\ud130\ub97c \uc774\ub3d9\ud560 \ub9cc\ud07c \ud65c\ub3d9\ub7c9\uc774 \ub9e4\uc6b0 \ub9ce\uc740 \ub3d9\ubb3c\uc774\ub2e4.","\ubca8\ub8e8\uac00\uac00 \uba78\uc885 \uc704\uae30\uc885\uc73c\ub85c \uc9c0\uc815\ub41c \uc774\ud6c4 \uc0ac\ub78c\ub4e4\uc5d0\uac8c \uc778\uae30\ub97c \uc5bb\uae30 \uc2dc\uc791\ud588\ub2e4.","\ub3d9\ubb3c \ubcf4\ud638 \ub2e8\uccb4\ub294 \uba78\uc885\uc744 \ub9c9\uae30 \uc704\ud574 \ubca8\ub8e8\uac00\ub97c \uc218\uc871\uad00\uc5d0\uc11c \uacc4\uc18d \ud0a4\uc6cc\uc57c \ud55c\ub2e4\uace0 \ubcf8\ub2e4."],"answer":1,"explanation":"\ubca8\ub8e8\uac00\ub294 \ud558\ub8e8\uc5d0 \uc218\ucc9c \ud0ac\ub85c\ubbf8\ud130\ub97c \uc774\ub3d9\ud558\ub294 \ud2b9\uc131\uc774 \uc788\ub2e4\uace0 \uba85\uc2dc\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4."},{"id":"16_\uc77d\uae30_1_2","lesson":16,"domain":"\uc77d\uae30","text_number":1,"passage_id":"16_\uc77d\uae30_1","type":"\uc720\ud615B","question":"\uc774 \uae00\uc758 \uc8fc\uc81c\ub85c \uac00\uc7a5 \uc54c\ub9de\uc740 \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"","options":["\uc218\uc871\uad00 \ubca8\ub8e8\uac00\uc758 \ud6c8\ub828 \ubc29\uc2dd\uc744 \uac1c\uc120\ud574\uc57c \ud558\ub294 \uad6c\uccb4\uc801\uc778 \uc774\uc720","\uc804 \uc138\uacc4 \uba78\uc885 \uc704\uae30\uc885 \uace0\ub798\ub4e4\uc744 \ubcf4\ud638\ud558\uae30 \uc704\ud55c \uad6d\uc81c\uc801\uc778 \ud611\ub825","\uba78\uc885 \uc704\uae30 \ub3d9\ubb3c\uc778 \ubca8\ub8e8\uac00\ub97c \ubcf4\ud638\ud558\uae30 \uc704\ud55c \ucd5c\uc120\uc758 \ubc29\ubc95\uc5d0 \ub300\ud55c \uace0\ubbfc","\uad6d\ub0b4 \uc218\uc871\uad00\uc758 \uad00\ub78c \ud658\uacbd\uc744 \uac1c\uc120\ud558\uc5ec \ubca8\ub8e8\uac00\uc758 \uc2a4\ud2b8\ub808\uc2a4\ub97c \uc904\uc774\ub294 \ubc95"],"answer":2,"explanation":"\uc790\uc5f0 \ubc29\ub958\uc640 \uc218\uc871\uad00 \ubcf4\ud638\ub77c\ub294 \uc0c1\ubc18\ub41c \uc785\uc7a5\uc744 \uc81c\uc2dc\ud558\uba70 \uc9c4\uc815\ud55c \ubcf4\ud638 \ubc29\uc548\uc5d0 \ub300\ud574 \uc758\ubb38\uc744 \ub358\uc9c0\ub294 \ub0b4\uc6a9\uc785\ub2c8\ub2e4."},{"id":"16_\uc77d\uae30_1_3","lesson":16,"domain":"\uc77d\uae30","text_number":1,"passage_id":"16_\uc77d\uae30_1","type":"\uc720\ud615G","question":"\uc774 \uae00\uc5d0\uc11c \uc54c \uc218 \uc5c6\ub294 \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"","options":["\ubca8\ub8e8\uac00\uac00 \ucc98\uc74c\uc73c\ub85c \uba78\uc885 \uc704\uae30\uc885\uc73c\ub85c \uc9c0\uc815\ub41c \uad6c\uccb4\uc801\uc778 \uc5f0\ub3c4","\ubca8\ub8e8\uac00\uac00 \uc881\uc740 \uc218\uc871\uad00\uc5d0\uc11c \uc0dd\ud65c\ud560 \ub54c \uacaa\uac8c \ub418\ub294 \uac74\uac15\uc0c1\uc758 \ubb38\uc81c","\ud604\uc7ac \ud55c\uad6d\uc758 \uc804\uccb4 \uc218\uc871\uad00\uc5d0\uc11c \uc0ac\uc721\ub418\uace0 \uc788\ub294 \uace0\ub798\ub958\uc758 \ucd1d \ub9c8\ub9bf\uc218","\ubca8\ub8e8\uac00\ub97c \ubd81\uadf9\ud574\ub85c \uc548\uc804\ud558\uac8c \uc62e\uae30\ub294 \ub370 \ub4dc\ub294 \uc2dc\uac04\uacfc \uad6c\uccb4\uc801\uc778 \ube44\uc6a9"],"answer":3,"explanation":"\uc9c0\uc815 \uc5f0\ub3c4, \uac74\uac15 \ubb38\uc81c, \uc0ac\uc721 \ub9c8\ub9bf\uc218\ub294 \ub098\uc640 \uc788\uc73c\ub098 \uc774\ub3d9 \uc2dc\uac04\uc774\ub098 \ube44\uc6a9\uc5d0 \ub300\ud55c \uc815\ubcf4\ub294 \uc5c6\uc2b5\ub2c8\ub2e4."},{"id":"16_\uc77d\uae30_2_1","lesson":16,"domain":"\uc77d\uae30","text_number":2,"passage_id":"16_\uc77d\uae30_2","type":"\uc720\ud615A","question":"\uae00\uc758 \ub0b4\uc6a9\uacfc \uac19\uc740 \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"","options":["\ud55c\uad6d\ud638\ub791\uc774\ub294 \uc2dc\ubca0\ub9ac\uc544\ud638\ub791\uc774\uc640 \uc720\uc804\uc801\uc73c\ub85c \uc644\uc804\ud788 \ub2e4\ub978 \uc885\uc774\ub2e4.","\uc77c\uc81c\uac15\uc810\uae30\uc5d0\ub294 \ud638\ub791\uc774\ub97c \ubcf4\ud638\ud558\uae30 \uc704\ud55c \ub2e4\uc591\ud55c \uc815\ucc45\uc774 \uc2dc\ud589\ub418\uc5c8\ub2e4.","\ud604\uc7ac \ud55c\uad6d \uc815\ubd80\ub294 \ud638\ub791\uc774 \uba78\uc885\uc744 \ub9c9\uae30 \uc704\ud55c \uad6d\ucc45 \uc5f0\uad6c\ub97c \uc9c4\ud589 \uc911\uc774\ub2e4.","\uc870\uc120 \uc2dc\ub300\uc5d0 \ub18d\uacbd\uc9c0\uac00 \ud655\ub300\ub418\uba74\uc11c \ud638\ub791\uc774\uc758 \uc11c\uc2dd\uc9c0\uac00 \uc810\ucc28 \uc904\uc5b4\ub4e4\uc5c8\ub2e4."],"answer":3,"explanation":"\uc870\uc120 \uc804\uae30\ubd80\ud130 \ub18d\uc0ac\uc9d3\ub294 \ub545\uc774 \ub298\uc5b4\ub098\uba74\uc11c \ud638\ub791\uc774\uc758 \uc11c\uc2dd\uc9c0 \uba74\uc801\uc774 \uc904\uc5b4\ub4e4\uc5c8\ub2e4\uace0 \uba85\uc2dc\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4."},{"id":"16_\uc77d\uae30_2_2","lesson":16,"domain":"\uc77d\uae30","text_number":2,"passage_id":"16_\uc77d\uae30_2","type":"\uc720\ud615B","question":"\uc774 \uae00\uc758 \uc8fc\uc81c\ub85c \uac00\uc7a5 \uc54c\ub9de\uc740 \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"","options":["\ud55c\uad6d\ud638\ub791\uc774\uac00 \ud55c\ubc18\ub3c4\uc5d0\uc11c \uc0ac\ub77c\uc9c0\uac8c \ub41c \uc5ed\uc0ac\uc801 \ubc30\uacbd\uacfc \ubcf5\uc6d0 \uacc4\ud68d","\ud55c\uad6d\ud638\ub791\uc774\uc758 \uba78\uc885 \uacfc\uc815\uacfc \ud6c4\uc190\uc778 \uc2dc\ubca0\ub9ac\uc544\ud638\ub791\uc774 \ubcf4\ud638\uc758 \ud544\uc694\uc131","\ub7ec\uc2dc\uc544\uc640 \ud55c\uad6d\uc758 \ud638\ub791\uc774 \ubcf4\ud638 \uc815\ucc45 \ucc28\uc774\uc810\uc5d0 \ub300\ud55c \ube44\ud310\uc801 \ubd84\uc11d","\ud638\ub791\uc774\uac00 \ud55c\uad6d\uc758 \uc61b\ub0a0\uc774\uc57c\uae30\uc640 \uc18d\ub2f4\uc5d0 \uc790\uc8fc \ub4f1\uc7a5\ud558\uac8c \ub41c \uc774\uc720"],"answer":1,"explanation":"\ud55c\ubc18\ub3c4\uc5d0\uc11c \ud638\ub791\uc774\uac00 \uc0ac\ub77c\uc9c4 \uc6d0\uc778\uc744 \uc124\uba85\ud558\uace0, \ub7ec\uc2dc\uc544\uc5d0 \ub0a8\uc544 \uc788\ub294 \ud6c4\uc190\uc778 \uc2dc\ubca0\ub9ac\uc544\ud638\ub791\uc774\ub97c \ubcf4\ud638\ud574\uc57c \ud55c\ub2e4\ub294 \uc810\uc744 \uac15\uc870\ud569\ub2c8\ub2e4."},{"id":"16_\uc77d\uae30_2_3","lesson":16,"domain":"\uc77d\uae30","text_number":2,"passage_id":"16_\uc77d\uae30_2","type":"\uc720\ud615G","question":"\uc774 \uae00\uc5d0\uc11c \uc54c \uc218 \uc5c6\ub294 \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"","options":["\ud55c\ubc18\ub3c4\uc5d0\uc11c \ub9c8\uc9c0\ub9c9 \ud55c\uad6d\ud638\ub791\uc774\uac00 \ubc1c\uacac\ub418\uc5b4 \uc0ac\ub0e5\ub41c \uc7a5\uc18c\uc640 \uc5f0\ub3c4","\ub7ec\uc2dc\uc544 \uc815\ubd80\uac00 \uc2dc\ubca0\ub9ac\uc544\ud638\ub791\uc774\ub97c \ubcf4\ud638\ud558\uae30 \uc704\ud574 \uc2e4\uc2dc\ud558\ub294 \uc815\ucc45","\uc11c\uc6b8\ub300\ud559\uad50 \uc5f0\uad6c\uc6d0\ub4e4\uc774 \uc9c4\ud589\ud558\ub294 \ucea0\ud398\uc778\uc758 \uad6c\uccb4\uc801\uc778 \ud65c\ub3d9 \ub0b4\uc6a9","\uc870\uc120 \uc2dc\ub300\uc5d0 \ud638\ub791\uc774\uc758 \uac1c\uccb4 \uc218\uac00 \uac10\uc18c\ud558\uae30 \uc2dc\uc791\ud55c \uadfc\ubcf8\uc801\uc778 \uc6d0\uc778"],"answer":2,"explanation":"\uc11c\uc6b8\ub300 \uc5f0\uad6c\ud300\uc774 \ucea0\ud398\uc778\uc744 \uc9c4\ud589\ud55c\ub2e4\ub294 \uc5b8\uae09\uc740 \uc788\uc73c\ub098, \uad6c\uccb4\uc801\uc778 \ud65c\ub3d9 \ub0b4\uc6a9\uc5d0 \ub300\ud574\uc11c\ub294 \ub098\uc624\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4."},{"id":"16_\uc77d\uae30_\uc720\ud615H_1","lesson":16,"domain":"\uc77d\uae30","text_number":90,"passage_id":"16_\uc77d\uae30_\uc720\ud615H","type":"\uc720\ud615H","question":"\ub2e4\uc74c \uc2e0\ubb38 \uae30\uc0ac \uc81c\ubaa9\uc744 \uac00\uc7a5 \uc798 \uc124\uba85\ud55c \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"","options":["\uac15\uc544\uc9c0\ub97c \ud0a4\uc6b0\uace0 \uc2f6\uc740 \uc0ac\ub78c\ub4e4\uc774 \ub9ce\uc544\uc9c0\uba74\uc11c \uc720\uae30\uacac \ubcf4\ud638\uc18c\uac00 \uc0c8\ub85c \uc0dd\uacbc\ub2e4.","\ubc84\ub824\uc9c4 \uac1c\ub4e4\uc774 \ub108\ubb34 \ub9ce\uc544\uc11c \ubcf4\ud638\uc18c\uac00 \uac00\ub4dd \ucc3c\uc73c\ub2c8 \uc785\uc591\uc744 \ub9ce\uc774 \ud574\ub2ec\ub77c\ub294 \ub73b\uc774\ub2e4.","\uc720\uae30\uacac \ubcf4\ud638\uc18c\uc5d0\uc11c \uac1c\ub97c \ub370\ub824\uc624\ub294 \uac83\ubcf4\ub2e4 \uac00\uac8c\uc5d0\uc11c \uc0ac\ub294 \uac83\uc774 \ub354 \uc548\uc804\ud558\ub2e4.","\uc720\uae30\uacac \ubcf4\ud638\uc18c\uc758 \uc2dc\uc124\uc744 \uae68\ub057\ud558\uac8c \uace0\uce58\uae30 \uc704\ud574 \uc2dc\ubbfc\ub4e4\uc758 \uc131\uae08\uc774 \ud544\uc694\ud558\ub2e4."],"answer":1,"explanation":"'\ud3ec\ud654 \uc0c1\ud0dc'\ub294 \uac00\ub4dd \ucc28\uc11c \ub354 \uc218\uc6a9\ud560 \uc218 \uc5c6\uc74c\uc744, '\uc785\uc591 \ubb38\ud654 \uc808\uc2e4'\uc740 \uc785\uc591\uc774 \uaf2d \ud544\uc694\ud568\uc744 \ub098\ud0c0\ub0c5\ub2c8\ub2e4."},{"id":"16_\uc77d\uae30_\uc720\ud615I_1","lesson":16,"domain":"\uc77d\uae30","text_number":91,"passage_id":"16_\uc77d\uae30_\uc720\ud615I","type":"\uc720\ud615I","question":"\ub2e4\uc74c\uc740 \ubb34\uc5c7\uc5d0 \ub300\ud55c \uae00\uc785\ub2c8\uae4c?","context":"","options":["\uc0dd\uba85 \uc874\uc911","\ubc18\ub824\ub3d9\ubb3c \uc785\uc591","\uac74\uac15 \uad00\ub9ac","\ub3d9\ubb3c \ubcd1\uc6d0"],"answer":1,"explanation":"\ubc18\ub824\ub3d9\ubb3c\uc744 \ud0a4\uc6b0\uae30 \uc804 \ucda9\ubd84\ud55c \uc900\ube44\uc640 \ucc45\uc784\uac10\uc774 \ud544\uc694\ud558\ub2e4\ub294 \ub0b4\uc6a9\uc774\ubbc0\ub85c '\ubc18\ub824\ub3d9\ubb3c \uc785\uc591'\uc5d0 \ub300\ud55c \uae00\uc785\ub2c8\ub2e4."},{"id":"16_\uc5b4\ud718_0_1","lesson":16,"domain":"\uc5b4\ud718","text_number":0,"passage_id":"","type":"\uc5b4\ud718A","question":"( )\uc5d0 \uac00\uc7a5 \uc54c\ub9de\uc740 \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"\uc720\ud559 \uc0dd\ud65c\uc744 \ud558\uba74\uc11c \uace0\ud5a5\uc5d0 \uc788\ub294 \uac00\uc871\uc774 \ubcf4\uace0 \uc2f6\uace0 \uc2ac\ud50c \ub54c\ub9c8\ub2e4, \uadc0\uc5ec\uc6b4 \uace0\uc591\uc774\ub97c \uc548\uace0 ( ) \uc2dc\uac04\uc744 \ubcf4\ub0c5\ub2c8\ub2e4.","options":["\ud544\uc694\uc131\uc744 \ub290\ub07c\ub294","\uc0ac\ud68c\uc131\uc744 \ud0a4\uc6b0\ub294","\ubc30\uc124\ubb3c\uc744 \uce58\uc6b0\ub294","\uc678\ub85c\uc6c0\uc744 \ub2ec\ub798\ub294"],"answer":3,"explanation":"\uac00\uc871\uc774 \ubcf4\uace0 \uc2f6\uace0 \uc4f8\uc4f8\ud55c \ub9c8\uc74c\uc744 \uc704\ub85c\ud558\ub294 \uc0c1\ud669\uc774\ubbc0\ub85c '\uc678\ub85c\uc6c0\uc744 \ub2ec\ub798\ub2e4'\uac00 \uac00\uc7a5 \uc54c\ub9de\uc2b5\ub2c8\ub2e4."},{"id":"16_\uc5b4\ud718_0_10","lesson":16,"
