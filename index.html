ac \uc0ac\uc815\uc774 \ub9ce\uc774 \uc5b4\ub835\ub2e4\uba74\uc11c\uc694?\n\ub098: \ub124. \ucd5c\uadfc \ub9e4\ucd9c\uc774 \uc904\uc5b4\ub4e0 \ub370\ub2e4\uac00 \uac00\uc7a5 \ubbff\uc5c8\ub358 \uc9c1\uc6d0(         ) \ud68c\uc0ac\ub97c \uadf8\ub9cc\ub46c\uc11c \uc815\ub9d0 \ub9c9\ub9c9\ud574\uc694.","options":["\ub9c8\uc800","\uc5d0 \uc758\ud574","\ub300\ub85c","\uacfc \ub2ec\ub9ac"],"answer":0,"explanation":"'\uba85\uc0ac+\ub9c8\uc800'\ub294 \ubd80\uc815\uc801\uc778 \uc0c1\ud669\uc5d0 \ub9c8\uc9c0\ub9c9 \ud558\ub098\uae4c\uc9c0 \ub354\ud574\uc9d0\uc744 \ub098\ud0c0\ub0bc \ub54c \uc0ac\uc6a9\ud569\ub2c8\ub2e4."},{"id":"16_\ubb38\ubc95_0_5","lesson":16,"domain":"\ubb38\ubc95","text_number":0,"passage_id":"","type":"\ubb38\ubc95C","question":"( ) \uc548\uc5d0 \ub4e4\uc5b4\uac08 \uc218 \uc5c6\ub294 \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"\uc544\ubb34\ub9ac (         ) \uac74\uac15\uc744 \uc704\ud574\uc11c \uc2dd\uc0ac\ub294 \uaf2d \ucc59\uaca8 \uba39\uc5b4\uc57c\uc9c0.","options":["\ubc14\uc058\ub354\ub77c\ub3c4","\ubc14\ube60\ub3c4","\ubc14\uc060\uc9c0\ub77c\ub3c4","\ubc14\uc058\ub2e4\uac00\ub294"],"answer":3,"explanation":"'-\ub2e4\uac00\ub294'\uc740 \ubd80\uc815\uc801\uc778 \uacb0\uacfc\uc5d0 \ub300\ud55c \uacbd\uace0\ub97c \ub098\ud0c0\ub0b4\ubbc0\ub85c \uc591\ubcf4\uc758 \ubb38\ub9e5\uc5d0\ub294 \uc5b4\uc0c9\ud569\ub2c8\ub2e4."},{"id":"16_\ubb38\ubc95_0_6","lesson":16,"domain":"\ubb38\ubc95","text_number":0,"passage_id":"","type":"\ubb38\ubc95C","question":"( ) \uc548\uc5d0 \ub4e4\uc5b4\uac08 \uc218 \uc5c6\ub294 \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"\uc606\uc9d1\uc5d0\uc11c \ubc24\uc0c8\ub3c4\ub85d \ud53c\uc544\ub178\ub97c \uccd0 (         ) \uc2dc\ub044\ub7ec\uc6cc\uc11c \uc7a0\uc744 \ud55c\uc228\ub3c4 \ubabb \uc7a4\ub2e4.","options":["\ub300\ub294 \ud1b5\uc5d0","\ub300\ub294 \ubc14\ub78c\uc5d0","\ub300\uc11c","\ub300\ub354\ub77c\ub3c4"],"answer":3,"explanation":"\ubd80\uc815\uc801 \uacb0\uacfc\uc758 \uc6d0\uc778\uc744 \uc5f0\uacb0\ud574\uc57c \ud558\ubbc0\ub85c \uc591\ubcf4\ub97c \ub098\ud0c0\ub0b4\ub294 '-\ub354\ub77c\ub3c4'\ub294 \ub4e4\uc5b4\uac08 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4."},{"id":"16_\ubb38\ubc95_0_7","lesson":16,"domain":"\ubb38\ubc95","text_number":0,"passage_id":"","type":"\ubb38\ubc95D","question":"\ub2e4\uc74c \uc911 \ud55c \ubb38\uc7a5\uc73c\ub85c \ub9de\uac8c \uc5f0\uacb0\ub41c \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"\uc0c8\ub85c\uc6b4 \ud658\uacbd \ubcf4\ud638 \ubc95\uc548 / \uad6d\ud68c / \ud1b5\uacfc\ub418\uc5c8\ub2e4","options":["\uc0c8\ub85c\uc6b4 \ud658\uacbd \ubcf4\ud638 \ubc95\uc548\uc740 \uad6d\ud68c\ub9c8\uc800 \ud1b5\uacfc\ub418\uc5c8\ub2e4.","\uc0c8\ub85c\uc6b4 \ud658\uacbd \ubcf4\ud638 \ubc95\uc548\uc740 \uad6d\ud68c\uc5d0 \uc758\ud574 \ud1b5\uacfc\ub418\uc5c8\ub2e4.","\uc0c8\ub85c\uc6b4 \ud658\uacbd \ubcf4\ud638 \ubc95\uc548\uc740 \uad6d\ud68c\uce58\uace0 \ud1b5\uacfc\ub418\uc5c8\ub2e4.","\uc0c8\ub85c\uc6b4 \ud658\uacbd \ubcf4\ud638 \ubc95\uc548\uc740 \uad6d\ud68c\uc5d0 \ube44\ud574\uc11c \ud1b5\uacfc\ub418\uc5c8\ub2e4."],"answer":1,"explanation":"\ud589\uc704 \uc8fc\uccb4\uac00 '\uad6d\ud68c'\uc784\uc744 \ub098\ud0c0\ub0b4\ubbc0\ub85c '\uba85\uc0ac+\uc5d0 \uc758\ud574(\uc11c)'\ub97c \uc0ac\uc6a9\ud558\ub294 \uac83\uc774 \uac00\uc7a5 \uc62c\ubc14\ub985\ub2c8\ub2e4."},{"id":"16_\ubb38\ubc95_0_8","lesson":16,"domain":"\ubb38\ubc95","text_number":0,"passage_id":"","type":"\ubb38\ubc95D","question":"\ub2e4\uc74c \uc911 \ud55c \ubb38\uc7a5\uc73c\ub85c \ub9de\uac8c \uc5f0\uacb0\ub41c \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"\uac00\ubc29\uc744 \uc783\uc5b4\ubc84\ub9ac\ub2e4 / \ud734\ub300\uc804\ud654 / \uace0\uc7a5 \ub098\ub2e4 / \uc5f0\ub77d\ud560 \ubc29\ubc95\uc774 \uc5c6\ub2e4","options":["\uac00\ubc29\uc744 \uc783\uc5b4\ubc84\ub838\ub294\ub370 \ud734\ub300\uc804\ud654\uc5d0 \uc758\ud574 \uace0\uc7a5 \ub098\uc11c \uc5f0\ub77d\ud560 \ubc29\ubc95\uc774 \uc5c6\ub2e4.","\uac00\ubc29\uc744 \uc783\uc5b4\ubc84\ub838\uc744 \ubfd0\ub9cc \uc544\ub2c8\ub77c \ud734\ub300\uc804\ud654\ub9c8\uc800 \uace0\uc7a5 \ub098\uc11c \uc5f0\ub77d\ud560 \ubc29\ubc95\uc774 \uc5c6\ub2e4.","\uac00\ubc29\uc744 \uc783\uc5b4\ubc84\ub9ac\ub294 \ubc14\ub78c\uc5d0 \ud734\ub300\uc804\ud654\uce58\uace0 \uace0\uc7a5 \ub098\uc11c \uc5f0\ub77d\ud560 \ubc29\ubc95\uc774 \uc5c6\ub2e4.","\uac00\ubc29\uc744 \uc783\uc5b4\ubc84\ub838\uc73c\ubbc0\ub85c \ud734\ub300\uc804\ud654\uc640 \ub2ec\ub9ac \uace0\uc7a5 \ub098\uc11c \uc5f0\ub77d\ud560 \ubc29\ubc95\uc774 \uc5c6\ub2e4."],"answer":1,"explanation":"\ubd80\uc815\uc801\uc778 \uc0c1\ud669\uc758 \uc2ec\ud654\uc640 \ub9c8\uc9c0\ub9c9 \ub0a8\uc740 \uac83\uae4c\uc9c0\uc758 \ud3ec\ud568\uc744 \ub098\ud0c0\ub0b4\ub294 \u2461\ubc88\uc774 \uac00\uc7a5 \uc801\uc808\ud569\ub2c8\ub2e4."},{"id":"17_\uc77d\uae30_1_1","lesson":17,"domain":"\uc77d\uae30","text_number":1,"passage_id":"17_\uc77d\uae30_1","type":"\uc720\ud615A","question":"\uae00\uc758 \ub0b4\uc6a9\uacfc \uac19\uc740 \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"","options":["\uacfc\ud559\uc790\ub294 \uc5f0\uad6c\ub97c \ud1b5\ud574 \uc0c8\ub85c\uc6b4 \uc0ac\uc2e4\uc744 \ubc1c\uacac\ud558\uae30\ub9cc \ud558\uba74 \ub41c\ub2e4.","\uaca8\uc6b8\ucca0 \ub208\uae38\uc5d0 \ubaa8\ub798\ub97c \ubfcc\ub9ac\ub294 \uac83\uc740 \ub9c8\ucc30\ub825\uc744 \uc904\uc774\uae30 \uc704\ud574\uc11c\uc774\ub2e4.","\uc2e0\ubc1c\uacfc \ubc14\ub2e5 \uc0ac\uc774\uc758 \ub9c8\ucc30\ub825\uc774 \uc791\uc544\uc9c0\uba74 \ubbf8\ub044\ub7ec\uc9c8 \ud655\ub960\uc774 \ub192\uc544\uc9c4\ub2e4.","\uacfc\ud559 \uc6a9\uc5b4\ub294 \uc544\uc8fc \uc5b4\ub824\uc6b0\ubbc0\ub85c \uc77c\ubc18\uc778\ub4e4\uc774 \uc774\ud574\ud558\ub294 \uac83\uc740 \ubd88\uac00\ub2a5\ud558\ub2e4."],"answer":2,"explanation":"\uc2e0\ubc1c\uacfc \ubc14\ub2e5\uc774 \ub2ff\uc558\uc744 \ub54c \ub9c8\ucc30\ub825\uc774 \uc791\uc73c\uba74 \ubbf8\ub044\ub7ec\uc6cc\uc11c \uc798 \uac78\uc744 \uc218 \uc5c6\ub2e4\uace0 \uba85\uc2dc\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4."},{"id":"17_\uc77d\uae30_1_2","lesson":17,"domain":"\uc77d\uae30","text_number":1,"passage_id":"17_\uc77d\uae30_1","type":"\uc720\ud615B","question":"\uc774 \uae00\uc758 \uc8fc\uc81c\ub85c \uac00\uc7a5 \uc54c\ub9de\uc740 \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"","options":["\uacfc\ud559\uc801\uc778 \uc6a9\uc5b4\ub97c \uc815\ud655\ud558\uac8c \uc815\uc758\ud558\uace0 \uc554\uae30\ud558\ub294 \ubc29\ubc95","\ub9c8\ucc30\ub825\uc744 \ud65c\uc6a9\ud558\uc5ec \uaca8\uc6b8\ucca0 \uc548\uc804\uc0ac\uace0\ub97c \uc608\ubc29\ud558\ub294 \ubc95","\uc77c\uc0c1 \uc18d \uacfc\ud559\uc5d0 \uad00\uc2ec\uc744 \uac16\uace0 \uc774\ub97c \uc27d\uac8c \uc774\ud574\ud558\ub824\ub294 \uc790\uc138","\uacfc\ud559\uc790\uac00 \uc5f0\uad6c\uc2e4\uc5d0\uc11c \uc0c8\ub85c\uc6b4 \uc9c0\uc2dd\uc744 \ubc1c\uacac\ud574\uc57c \ud558\ub294 \uc774\uc720"],"answer":2,"explanation":"\uc77c\uc0c1 \uc18d \uacfc\ud559 \ud604\uc0c1\uc5d0 \uad00\uc2ec\uc744 \uac00\uc9c0\uace0 \ub450\ub824\uc6c0\uc744 \uadf9\ubcf5\ud558\uc5ec \uacfc\ud559\uc758 \uc990\uac70\uc6c0\uc744 \uc54c\uac8c \ub418\uae30\ub97c \uad8c\uc720\ud558\ub294 \ub0b4\uc6a9\uc785\ub2c8\ub2e4."},{"id":"17_\uc77d\uae30_1_3","lesson":17,"domain":"\uc77d\uae30","text_number":1,"passage_id":"17_\uc77d\uae30_1","type":"\uc720\ud615G","question":"\uc774 \uae00\uc5d0\uc11c \uc54c \uc218 \uc5c6\ub294 \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"","options":["\ub9c8\ucc30\ub825\uc774\ub780 \uad6c\uccb4\uc801\uc73c\ub85c \ubb34\uc5c7\uc744 \uc758\ubbf8\ud558\ub294\uac00?","\uaca8\uc6b8\ucca0 \uae38\uc5d0 \ubaa8\ub798\ub97c \ubfcc\ub9ac\uba74 \uc65c \ub35c \ubbf8\ub044\ub7ec\uc6b4\uac00?","\ud544\uc790\uac00 \uc0dd\uac01\ud558\ub294 \uacfc\ud559\uc790\uc758 \ubc14\ub78c\uc9c1\ud55c \uc5ed\ud560\uc740 \ubb34\uc5c7\uc778\uac00?","\ub9c8\ucc30\ub825\uc744 \ub192\uc774\uae30 \uc704\ud574 \uc2e0\ubc1c\uc744 \ub9cc\ub4e4 \ub54c \uc0ac\uc6a9\ud558\ub294 \uc7ac\ub8cc\ub294 \ubb34\uc5c7\uc778\uac00?"],"answer":3,"explanation":"\ub9c8\ucc30\ub825\uc758 \uc815\uc758, \ubaa8\ub798\uc758 \uc5ed\ud560, \uacfc\ud559\uc790\uc758 \uc5ed\ud560\uc740 \uc5b8\uae09\ub418\uc5c8\uc73c\ub098 \uc2e0\ubc1c\uc758 \uad6c\uccb4\uc801\uc778 \uc81c\uc791 \uc7ac\ub8cc\ub294 \ub098\uc640 \uc788\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4."},{"id":"17_\uc77d\uae30_2_1","lesson":17,"domain":"\uc77d\uae30","text_number":2,"passage_id":"17_\uc77d\uae30_2","type":"\uc720\ud615A","question":"\uae00\uc758 \ub0b4\uc6a9\uacfc \uac19\uc740 \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"","options":["\uc815\uc804\uae30\ub294 \uc804\uae30\uac00 \uacc4\uc18d\ud574\uc11c \ud750\ub974\ub294 \uc131\uc9c8 \ub54c\ubb38\uc5d0 \ubd99\uc5ec\uc9c4 \uc774\ub984\uc774\ub2e4.","\uc815\uc804\uae30\uac00 \ubc1c\uc0dd\ud560 \ub54c\uc758 \uc804\uc555\uc740 \ub9e4\uc6b0 \ub0ae\uc544\uc11c \uc778\uccb4\uc5d0 \ud1b5\uc99d\uc744 \uc8fc\uc9c0 \uc54a\ub294\ub2e4.","\uc77c\ud68c\uc6a9 \ub9c8\uc2a4\ud06c\uc758 \ud544\ud130\ub294 \uc815\uc804\uae30\ub97c \uc774\uc6a9\ud574 \ubbf8\uc138 \uba3c\uc9c0\ub97c \ub04c\uc5b4\ub2f9\uaca8 \uac78\ub7ec \ub0b8\ub2e4.","\uacf5\uae30 \uc911\uc5d0 \uc218\ubd84\uc774 \ub9ce\uc744\uc218\ub85d \uc815\uc804\uae30\ub825\uc774 \uac15\ud574\uc838\uc11c \uc815\uc804\uae30\uac00 \ub354 \uc790\uc8fc \ubc1c\uc0dd\ud55c\ub2e4."],"answer":2,"explanation":"\ub9c8\uc2a4\ud06c \uc548\uc758 \uc815\uc804\uae30 \ud544\ud130\uac00 \ubbf8\uc138 \uba3c\uc9c0\ub97c \ubd99\uc7a1\uc544 \ud638\ud761\uae30\ub85c \ub4e4\uc5b4\uac00\uc9c0 \ubabb\ud558\uac8c \ud55c\ub2e4\uace0 \uc124\uba85\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4."},{"id":"17_\uc77d\uae30_2_2","lesson":17,"domain":"\uc77d\uae30","text_number":2,"passage_id":"17_\uc77d\uae30_2","type":"\uc720\ud615B","question":"\uc774 \uae00\uc758 \uc8fc\uc81c\ub85c \uac00\uc7a5 \uc54c\ub9de\uc740 \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"","options":["\uc815\uc804\uae30\uac00 \ubc1c\uc0dd\ud558\ub294 \uacfc\ud559\uc801 \uc6d0\ub9ac\uc640 \uc77c\uc0c1 \uc18d\uc5d0\uc11c\uc758 \ud2b9\uc9d5 \ubc0f \ud65c\uc6a9","\uaca8\uc6b8\ucca0 \uc815\uc804\uae30\ub85c \uc778\ud55c \uac00\uc804\uc81c\ud488\uc758 \uace0\uc7a5\uc744 \uc608\ubc29\ud558\ub294 \uad6c\uccb4\uc801 \ubc29\ubc95","\uc77c\ud68c\uc6a9 \ub9c8\uc2a4\ud06c \ud544\ud130\uc758 \uad6c\uc870\ub97c \ud1b5\ud574 \ubcf8 \ubbf8\uc138 \uba3c\uc9c0 \ucc28\ub2e8\uc758 \uc911\uc694\uc131","\ub9c8\ucc30 \uc804\uae30\ub97c \uc774\uc6a9\ud558\uc5ec \uc0c8\ub85c\uc6b4 \uce5c\ud658\uacbd \uc5d0\ub108\uc9c0\ub97c \uc0dd\uc0b0\ud558\ub294 \uae30\uc220\ub825"],"answer":0,"explanation":"\uc815\uc804\uae30\uc758 \uc815\uc758, \ubc1c\uc0dd \uc6d0\uc778, \uadf8\ub9ac\uace0 \uc2e4\uc0dd\ud65c\uc5d0\uc11c\uc758 \ubd88\ud3b8\ud568\uacfc \uc720\uc6a9\uc131\uc744 \uc804\uccb4\uc801\uc73c\ub85c \ub2e4\ub8e8\uace0 \uc788\uc2b5\ub2c8\ub2e4."},{"id":"17_\uc77d\uae30_2_3","lesson":17,"domain":"\uc77d\uae30","text_number":2,"passage_id":"17_\uc77d\uae30_2","type":"\uc720\ud615G","question":"\uc774 \uae00\uc5d0\uc11c \uc54c \uc218 \uc5c6\ub294 \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"","options":["\uc815\uc804\uae30\uac00 \ubc1c\uc0dd\ud560 \ub54c \uc21c\uac04\uc801\uc73c\ub85c \ub098\ud0c0\ub0a0 \uc218 \uc788\ub294 \uc804\uc555\uc758 \uc218\uce58","\uc815\uc804\uae30\uac00 \uc2b5\ub3c4\uac00 \ub192\uc740 \uc5ec\ub984\ubcf4\ub2e4 \uac74\uc870\ud55c \uaca8\uc6b8\uc5d0 \ub354 \uc790\uc8fc \uc0dd\uae30\ub294 \uc774\uc720","\uc2e0\uccb4 \uac74\uc870\ud568\uc744 \ub9c9\uc544 \uc815\uc804\uae30 \ubc1c\uc0dd\uc744 \uc904\uc77c \uc218 \uc788\ub294 \uad6c\uccb4\uc801\uc778 \uc0dd\ud65c \uc2b5\uad00","\ub9c8\ucc30 \uc774\uc678\uc5d0 \uc815\uc804\uae30\ub97c \uc778\uc704\uc801\uc73c\ub85c \ub9cc\ub4e4\uc5b4 \ub0bc \uc218 \uc788\ub294 \ub610 \ub2e4\ub978 \ubc29\ubc95"],"answer":3,"explanation":"\uc804\uc555 \uc218\uce58, \uacc4\uc808\ubcc4 \ucc28\uc774 \uc774\uc720, \uc608\ubc29 \uc0dd\ud65c \uc2b5\uad00\uc740 \ub098\uc640 \uc788\uc9c0\ub9cc \ub9c8\ucc30 \uc774\uc678\uc758 \ubc1c\uc0dd \ubc29\ubc95\uc740 \uc5b8\uae09\ub418\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4."},{"id":"17_\uc77d\uae30_\uc720\ud615H_1","lesson":17,"domain":"\uc77d\uae30","text_number":90,"passage_id":"17_\uc77d\uae30_\uc720\ud615H","type":"\uc720\ud615H","question":"\ub2e4\uc74c \uc2e0\ubb38 \uae30\uc0ac \uc81c\ubaa9\uc744 \uac00\uc7a5 \uc798 \uc124\uba85\ud55c \uac83\uc744 \uace0\ub974\uc2ed\uc2dc\uc624.","context":"","options":["\uaca8\uc6b8\uc5d0\ub294 \ub0a0\uc528\uac00 \uac74\uc870\ud558\uae30 \ub54c\ubb38\uc5d0 \uc815\uc804\uae30\uac00 \ub354 \uc790\uc8fc \ubc1c\uc0dd\ud55c\ub2e4.","\uc815\uc804\uae30\ub97c \uc5c6\uc560\ub824\uba74 \uc2e4\ub0b4\uc758 \uc2b5\ub3c4\ub97c \uc801\uc808\ud558\uac8c \ub9de\ucd94\ub294 \uac83\uc774 \ud6a8\uacfc\uc801\uc774\ub2e4.","\uc815\uc804\uae30\ub294 \uc6b0\ub9ac \ubab8\uc5d0 \ud574\ub86d\uc9c0 \uc54a\uc73c\ubbc0\ub85c \ud2b9\ubcc4\ud788 \uad00\ub9ac\ud560 \ud544\uc694\uac00 \uc5c6\ub2e4.","\uc815\uc804\uae30\ub294 \uacc4\uc808\uc774\ub098 \uc628\ub3c4\uc640 \uad00\uacc4\uc5c6\uc774 \uc5b8\uc81c\ub098 \uc77c\uc815\ud558\uac8c \ubc1c\uc0dd\ud55c\ub2e4."],"answer":1,"explanation":"'\uc2b5\ub3c4 \uc870\uc808\ub85c \uc7a1\ub294\ub2e4'\ub294 \uac83\uc740 \uc2b5\ub3c4\ub97c \uc870\uc808\ud568\uc73c\ub85c\uc368 \uc815\uc804\uae30 \ubb38\uc81c\ub97c \ud574\uacb0\ud558\uac70\ub098 \uc608\ubc29\ud560 \uc218 \uc788\ub2e4\ub294 \ub73b\uc785\ub2c8\ub2e4."},{"id":"17_\uc77d\uae30_\uc720\ud615I_1","lesson":17,"domain":"\uc77d\uae30","text_number":91,"passage_id":"17_\uc77d\uae30_\uc720\ud615I","type":"\uc720\ud615I","question":"\ub2e4\uc74c\uc740 \ubb34\uc5c7\uc5d0 \ub300\ud55c \uae00\uc785\ub2c8\uae4c?","context":"","options":["\ub0a0\uc528 \ud2b9\uc9d5","\uc0dd\ud65c \uacfc\ud559","\uc804\uae30 \uc808\uc57d","\uaca8\uc6b8 \uac74\uac15"],"answer":1,"explanation":"\uc77c\uc0c1\uc5d0\uc11c \uacbd\ud5d8\ud558\ub294 \ud604\uc0c1\uc758 \uc6d0\ub9ac\ub97c \uc124\uba85\ud558\uace0 \uc788\uc73c\ubbc0\ub85c '\uc0dd\ud65c \uacfc\ud559'\uc5d0 \ub300\ud55c \uae00\uc785\ub2c8\ub2e4."},{"id":"17_\uc5b4\ud718_0_1","lesson":17,"domain":"\uc5b4\ud718","te <script>
const QUIZ_DATA = JSON.parse(document.getElementById("quiz-data").textContent);

var selectedLessons = 'all';
var selectedDomain = 'all';
var quizMode = 'feedback';
var currentQuestions = [];
var userAnswers = {};
var submitted = false;

function toggleLesson(val) {
  if (val === 'all') {
    selectedLessons = 'all';
    document.querySelector('.lesson-all').classList.add('active');
    document.querySelectorAll('.lesson-btn[data-lesson]').forEach(b => b.classList.remove('active'));
  } else {
    document.querySelector('.lesson-all').classList.remove('active');
    const btn = document.querySelector(`.lesson-btn[data-lesson="${val}"]`);
    btn.classList.toggle('active');
    const active = [...document.querySelectorAll('.lesson-btn[data-lesson].active')].map(b => parseInt(b.dataset.lesson));
    if (active.length === 0) {
      selectedLessons = 'all';
      document.querySelector('.lesson-all').classList.add('active');
    } else {
      selectedLessons = active;
    }
  }
  updateCountInfo();
}

function toggleDomain(val) {
  selectedDomain = val;
  document.querySelectorAll('.domain-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.domain-btn[data-domain="${val}"]`).classList.add('active');
  updateCountInfo();
}

function selectMode(mode, el) {
  quizMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function getFilteredQuestions() {
  let qs = QUIZ_DATA.questions;
  if (selectedLessons !== 'all') qs = qs.filter(q => selectedLessons.includes(q.lesson));
  if (selectedDomain !== 'all') qs = qs.filter(q => q.domain === selectedDomain);
  return qs;
}

// 읽기 지문당 1문제만 추출하는 함수
function pickQuestionsWithUniquePassage(pool, count) {
  const shuffled = shuffle(pool);
  const picked = [];
  const usedPassages = new Set();

  for (const q of shuffled) {
    if (picked.length >= count) break;
    if (q.domain === '읽기' && q.passage_id) {
      if (usedPassages.has(q.passage_id)) continue;
      usedPassages.add(q.passage_id);
    }
    picked.push(q);
  }
  return picked;
}

function updateCountInfo() {
  const pool = getFilteredQuestions();
  // 읽기: 지문 중복 제거 후 가능한 문제 수 추산
  const readingPassages = new Set(pool.filter(q => q.domain === '읽기' && q.passage_id).map(q => q.passage_id));
  const nonReading = pool.filter(q => q.domain !== '읽기').length;
  const maxPossible = readingPassages.size + nonReading;
  const pick = Math.min(20, maxPossible);
  const el = document.getElementById('count-info');
  const btn = document.getElementById('start-btn');
  if (maxPossible === 0) {
    el.textContent = '선택한 범위에 문제가 없습니다.';
    btn.disabled = true;
  } else {
    el.textContent = `최대 ${maxPossible}개 중 랜덤으로 ${pick}개 출제 (읽기: 지문당 1문제)`;
    btn.disabled = false;
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const DOMAIN_ORDER = {'어휘': 0, '문법': 1, '읽기': 2};

function startQuiz() {
  const pool = getFilteredQuestions();
  const picked = pickQuestionsWithUniquePassage(pool, 20);
  // 어휘 → 문법 → 읽기 순으로 정렬
  picked.sort((a, b) => (DOMAIN_ORDER[a.domain] ?? 9) - (DOMAIN_ORDER[b.domain] ?? 9));
  currentQuestions = picked;
  userAnswers = {};
  submitted = false;
  renderQuiz();
}

function retryQuiz() { startQuiz(); }

function goSetup() {
  document.getElementById('setup-screen').style.display = 'block';
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
}

function renderQuiz() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('mode-badge').textContent = quizMode === 'feedback' ? '💡 즉시 피드백' : '📝 시험 모드';

  if (quizMode === 'exam') {
    document.getElementById('exam-footer').style.display = 'flex';
    document.getElementById('bottom-space').style.display = 'block';
    document.getElementById('submit-btn').disabled = true;
    document.getElementById('answered-count').textContent = '0';
  } else {
    document.getElementById('exam-footer').style.display = 'none';
    document.getElementById('bottom-space').style.display = 'none';
  }

  updateProgress();
  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  currentQuestions.forEach((q, idx) => container.appendChild(renderQuestion(q, idx)));
}

function renderQuestion(q, idx) {
  const wrap = document.createElement('div');
  wrap.className = 'card';
  wrap.id = `q-${idx}`;

  const metaHTML = `<div class="question-meta">
    <span class="badge badge-lesson">${q.lesson}과</span>
    <span class="badge badge-domain">${q.domain}</span>
    <span class="badge badge-type">${q.type}</span>
  </div>`;

  // 지문 (유형F는 전체 지문 숨김)
  let passageHTML = '';
  if (q.domain === '읽기' && q.passage_id && q.type !== '유형F') {
    const passage = QUIZ_DATA.passages.find(p => p.id === q.passage_id);
    if (passage) {
      const passageContent = escapeHtml(passage.content).replace(/\n/g, '<br>');
      passageHTML = `
        <div class="passage-label">📖 지문</div>
        <div class="passage-box">${passageContent}</div>
      `;
    }
  }

  // 보기/문맥
  let contextHTML = '';
  if (q.type === '유형F' && q.context && typeof q.context === 'object') {
    const jimun = escapeHtml(q.context['지문'] || '').replace(/[㉠㉡㉢㉣]/g, m => `<strong>${m}</strong>`);
    contextHTML = `
      <div class="bogi-box">
        <div class="bogi-label">&lt;보기&gt;</div>
        <div>${escapeHtml(q.context['보기'] || '')}</div>
      </div>
      <div class="context-box">${jimun}</div>
    `;
  } else if (q.context && typeof q.context === 'string' && q.context.trim()) {
    const ctx = escapeHtml(q.context)
      .replace(/\*\*(.+?)\*\*/g, '<u>$1</u>')
      .replace(/\*(.+?)\*/g, '<u>$1</u>');
    contextHTML = `<div class="context-box">${ctx}</div>`;
  }

  const nums = ['①', '②', '③', '④'];
  const optionsHTML = q.options.map((opt, oi) => `
    <div class="option" id="opt-${idx}-${oi}" onclick="selectOption(${idx}, ${oi})">
      <span class="option-num">${nums[oi]}</span>
      <span class="option-text">${escapeHtml(String(opt))}</span>
    </div>
  `).join('');

  wrap.innerHTML = `
    ${metaHTML}
    ${passageHTML}
    <div class="question-text">${idx + 1}. ${escapeHtml(q.question)}</div>
    ${contextHTML}
    <div class="options" id="opts-${idx}">${optionsHTML}</div>
    <div class="explanation" id="exp-${idx}">
      <div class="exp-label" id="exp-label-${idx}"></div>
      <span id="exp-text-${idx}"></span>
    </div>
  `;
  return wrap;
}

function selectOption(idx, oi) {
  const q = currentQuestions[idx];
  if (quizMode === 'feedback' && userAnswers[idx] !== undefined) return;
  if (submitted) return;

  userAnswers[idx] = oi;

  const opts = document.getElementById(`opts-${idx}`).children;
  [...opts].forEach((opt, i) => {
    opt.classList.remove('selected', 'correct', 'wrong');
    if (quizMode === 'feedback') {
      if (i === q.answer) opt.classList.add('correct');
      else if (i === oi) opt.classList.add('wrong');
    } else {
      if (i === oi) opt.classList.add('selected');
    }
  });

  if (quizMode === 'feedback') {
    const expEl = document.getElementById(`exp-${idx}`);
    const labelEl = document.getElementById(`exp-label-${idx}`);
    const textEl = document.getElementById(`exp-text-${idx}`);
    const isCorrect = oi === q.answer;
    expEl.className = `explanation ${isCorrect ? 'correct-exp' : 'wrong-exp'}`;
    labelEl.textContent = isCorrect ? '✅ 정답입니다!' : `❌ 오답입니다. 정답은 ${['①','②','③','④'][q.answer]}번`;
    textEl.textContent = q.explanation;
  } else {
    const answered = Object.keys(userAnswers).length;
    document.getElementById('answered-count').textContent = answered;
    document.getElementById('submit-btn').disabled = answered < currentQuestions.length;
  }
  updateProgress();
}

function updateProgress() {
  const total = currentQuestions.length;
  const answered = Object.keys(userAnswers).length;
  const correct = Object.entries(userAnswers).filter(([i, a]) => a === currentQuestions[i].answer).length;
  document.getElementById('progress-text').textContent = `${answered} / ${total}문제`;
  document.getElementById('progress-fill').style.width = `${(answered / total) * 100}%`;
  if (quizMode === 'feedback') {
    document.getElementById('progress-score').textContent = answered > 0 ? `정답 ${correct}개` : '';
  } else if (submitted) {
    document.getElementById('progress-score').textContent = `${correct} / ${total}`;
  } else {
    document.getElementById('progress-score').textContent = `${answered}개 완료`;
  }
}

function submitExam() {
  submitted = true;
  document.getElementById('exam-footer').style.display = 'none';
  document.getElementById('bottom-space').style.display = 'none';

  currentQuestions.forEach((q, idx) => {
    const userAns = userAnswers[idx];
    const opts = document.getElementById(`opts-${idx}`).children;
    [...opts].forEach((opt, i) => {
      opt.classList.remove('selected');
      if (i === q.answer) opt.classList.add('correct');
      else if (i === userAns && userAns !== q.answer) opt.classList.add('wrong');
    });
    const expEl = document.getElementById(`exp-${idx}`);
    const labelEl = document.getElementById(`exp-label-${idx}`);
    const textEl = document.getElementById(`exp-text-${idx}`);
    const isCorrect = userAns === q.answer;
    expEl.className = `explanation ${isCorrect ? 'correct-exp' : 'wrong-exp'}`;
    labelEl.textContent = isCorrect ? '✅ 정답입니다!' : `❌ 오답입니다. 정답은 ${['①','②','③','④'][q.answer]}번`;
    textEl.textContent = q.explanation;
  });

  updateProgress();
  showResult();
}

function showResult() {
  const total = currentQuestions.length;
  const correct = Object.entries(userAnswers).filter(([i, a]) => a === currentQuestions[i].answer).length;
  const pct = Math.round((correct / total) * 100);

  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-num').textContent = correct;
  document.getElementById('result-total').textContent = `/ ${total}`;

  let label = '', sub = '';
  if (pct >= 90) { label = '🎉 훌륭해요!'; sub = '거의 다 맞혔어요. 시험 준비 완벽해요!'; }
  else if (pct >= 70) { label = '👏 잘했어요!'; sub = '조금만 더 연습하면 완벽할 거예요.'; }
  else if (pct >= 50) { label = '💪 괜찮아요!'; sub = '오답을 다시 확인하고 복습해 보세요.'; }
  else { label = '📖 더 공부해요!'; sub = '아래 오답을 꼼꼼히 확인해 보세요.'; }

  document.getElementById('result-label').textContent = label;
  document.getElementById('result-sub').textContent = sub;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = total - correct;
  document.getElementById('stat-pct').textContent = pct + '%';

  const wrongList = currentQuestions.map((q, i) => ({q, i, ans: userAnswers[i]})).filter(({q, i, ans}) => ans !== q.answer);
  const reviewContainer = document.getElementById('review-container');

  if (wrongList.length === 0) {
    reviewContainer.innerHTML = '<div class="empty-state">🎊 오답이 없어요! 완벽한 점수예요!</div>';
    return;
  }

  const nums = ['①','②','③','④'];
  reviewContainer.innerHTML = wrongList.map(({q, i, ans}) => `
    <div style="border-bottom:1px solid var(--border);padding-bottom:16px;margin-bottom:16px;">
      <div class="question-meta">
        <span class="badge badge-lesson">${q.lesson}과</span>
        <span class="badge badge-domain">${q.domain}</span>
      </div>
      <div style="font-size:14px;font-weight:600;margin-bottom:8px;line-height:1.6;">${i+1}. ${escapeHtml(q.question)}</div>
      <div style="font-size:13px;color:var(--wrong);margin-bottom:4px;">내 답: ${nums[ans] || '?'} ${escapeHtml(String(q.options[ans] || ''))}</div>
      <div style="font-size:13px;color:var(--correct);margin-bottom:8px;">정답: ${nums[q.answer]} ${escapeHtml(String(q.options[q.answer]))}</div>
      <div style="font-size:13px;color:var(--text-sub);line-height:1.6;background:var(--bg);padding:10px;border-radius:6px;">${escapeHtml(q.explanation)}</div>
    </div>
  `).join('');
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

updateCountInfo();
</script>
